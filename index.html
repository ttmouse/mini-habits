<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/svg+xml" href="sprites/favicon.svg">
<title>朱古力豆 · 养成好习惯</title>
<script src="lucide.js"></script>
<style>
/* ===== DESIGN TOKENS ===== */
:root{
  /* Neutral palette (warm zinc) */
  --n50:#f7f6f3;
  --n100:#f2f0eb;
  --n150:#e8e5df;
  --n200:#e4e4e7;
  --n250:#d4d1ca;
  --n300:#a8a49d;
  --n400:#8a8680;
  --n500:#6d6964;
  --n600:#55514c;
  --n700:#3c3c3c;
  --n800:#27272a;
  --n900:#1a1a18;

  /* Semantic colors */
  --primary:#58CC02;
  --primary-light:#46a302;
  --primary-dark:#3a8a02;
  --primary-ring:rgba(88,204,2,.35);
  --primary-shadow:rgba(88,204,2,.3);
  --primary-shadow-lg:rgba(88,204,2,.5);
  --blue:#1cb0f6;
  --orange:#ff9600;
  --orange-dark:#ff7800;
  --purple:#c054f7;
  --red:#FF4B4B;
  --gold:#ff9600;
  --gold-dark:#ff7800;

  /* Surfaces */
  --bg:#f2f0eb;
  --surface:#ffffff;
  --surface-elevated:#ffffff;
  --overlay:rgba(0,0,0,.5);
  --overlay-light:rgba(0,0,0,.4);

  /* Text tokens */
  --text:#3c3c3c;
  --text-secondary:#6d6964;
  --text-tertiary:#a8a49d;
  --text-muted:#bbb;

  /* Border tokens */
  --border:#e4e4e7;
  --border-light:#dcdcdc;
  --border-focus:#58CC02;

  /* Shadow tokens — 5 levels */
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12);
  --shadow-xl:0 20px 60px rgba(0,0,0,.30);
  --shadow-primary:0 4px 20px var(--primary-shadow-lg),0 0 0 5px var(--primary-ring);

  /* Radius tokens */
  --r-sm:6px;
  --r-md:12px;
  --r-lg:16px;
  --r-xl:24px;
  --r-2xl:28px;
  --r-full:50%;

  /* Spacing tokens (4px base) */
  --s1:4px;
  --s2:8px;
  --s3:12px;
  --s4:16px;
  --s5:20px;
  --s6:24px;
  --s8:32px;
  --s10:40px;
  --s12:48px;

  /* Motion tokens */
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-smooth:cubic-bezier(.16,1,.3,1);
  --fast:150ms;
  --std:250ms;
  --slow:400ms;
}

/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
  overflow-x:hidden;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:4px}
button{border:none;cursor:pointer;font-family:inherit;transition:all var(--std) var(--ease-smooth)}
button:active{transform:scale(.97)}
.btn-add:active{transform:scale(.92)}
.task-check:active{transform:scale(.9)}
button:disabled{opacity:.4!important;pointer-events:none}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:var(--r-sm)}

/* ===== TOP BAR ===== */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--s3) var(--s4);
  background:var(--surface);
  border-radius:0 0 var(--r-xl) var(--r-xl);
  box-shadow:var(--shadow-md);
  position:sticky;top:0;z-index:100;
}
.app-title{font-size:18px;font-weight:800;color:var(--text);flex-shrink:0}

/* Monkey in level-up modal */
.lvl-monkey{
  width:120px;height:140px;display:block;margin:0 auto var(--s2);
  animation:lvlMonkeyPop .6s var(--ease-spring);
}
@keyframes lvlMonkeyPop{
  0%{transform:scale(0) rotate(-10deg);opacity:0}
  60%{transform:scale(1.1) rotate(3deg);opacity:1}
  100%{transform:scale(1) rotate(0)}
}
.modal .big{font-size:72px;display:block;margin-bottom:var(--s3)}
.top-center{display:flex;align-items:center;gap:var(--s3)}
.hearts-display{
  display:flex;gap:var(--s1);font-size:26px;
  line-height:1;
}
.stat-pill{
  font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:var(--s1);
  background:var(--n50);
  padding:var(--s1) var(--s3);border-radius:var(--r-xl);
  color:var(--text-secondary);
}

/* ===== App Container ===== */
.app{max-width:480px;margin:0 auto;padding:0 var(--s4) 100px}



/* ===== 合并卡片：进度 + 猴子 ===== */
.merged-card{
  display:flex;align-items:center;gap:var(--s3);
  padding:var(--s2) 0;
  margin:var(--s2) var(--s1) 0;
  cursor:pointer;
}
.merged-card:active{transform:scale(.97)}
.merged-avatar{flex-shrink:0;width:108px;height:108px;display:flex;align-items:center;justify-content:center}
.merged-avatar img{width:100%;height:100%;display:block;object-fit:contain}
.merged-body{flex:1;min-width:0}
.merged-top{display:flex;align-items:center;margin-bottom:var(--s1)}
.card-footer{display:flex;justify-content:flex-end;margin-top:var(--s1)}
.card-history{font-size:11px;color:var(--text-tertiary);display:flex;align-items:center;gap:3px;cursor:pointer;padding:2px 6px;border-radius:6px;transition:all var(--fast)}
.card-history:hover{color:var(--primary);background:#f0f8e8}

.lvl-badge{
  font-size:12px;font-weight:700;color:var(--text-secondary);
  display:flex;align-items:center;gap:var(--s1);
}


.progress-body{flex:1;min-width:0}
.exp-bar-compact{margin-bottom:0}
.exp-bar-compact .exp-bar-bg{
  background:var(--n150);
  border-radius:20px;height:10px;overflow:hidden;
}
.exp-bar-compact .exp-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--primary),var(--primary-light));
  border-radius:20px;
  transition:width var(--slow) var(--ease-spring);
  position:relative;
}
.exp-bar-compact .exp-bar-fill::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));
  border-radius:20px;
}
.exp-bar-compact .exp-label{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--text-tertiary);margin-top:var(--s1);
}


/* ===== TABS ===== */
.tabs{
  display:flex;gap:var(--s1);margin-bottom:var(--s3);
  background:var(--n150);
  border-radius:14px;padding:var(--s1);
}
.tab{
  flex:1;padding:var(--s3) var(--s1);border:none;border-radius:11px;
  font-size:13px;font-weight:700;cursor:pointer;
  background:transparent;color:var(--text-tertiary);
  transition:all var(--std) var(--ease-smooth);
  white-space:nowrap;
  display:flex;align-items:center;justify-content:center;gap:var(--s1);
}
.tab:hover{color:var(--text-secondary)}
.tab.active{
  background:var(--surface);
  color:var(--text);
  box-shadow:var(--shadow-sm);
}
.tab .badge{
  background:var(--red);color:#fff;font-size:10px;
  padding:var(--s1) var(--s2);border-radius:8px;font-weight:700;
}

/* ===== HABIT CARD (多邻国风格) ===== */
.task-habit{justify-content:space-between;gap:var(--s2)}
.task-habit .task-body{flex:0 1 auto}
.habit-right{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.habit-btn-big{
  width:44px;height:44px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;font-family:inherit;
  background:var(--primary);color:#fff;
  cursor:pointer;transition:all var(--fast) var(--ease-spring);
  line-height:1;padding:0;
  box-shadow:0 4px 0 var(--primary-dark),0 6px 12px var(--primary-shadow-lg);
  border:none;
  position:relative;
  transform:translateY(-2px);
}
.habit-btn-big:active{
  transform:translateY(2px);
  box-shadow:0 1px 0 var(--primary-dark),0 3px 8px var(--primary-shadow-lg);
}

.habit-count{
  font-size:11px;font-weight:700;color:var(--primary-dark);
  white-space:nowrap;height:16px;line-height:16px;
}
.habit-count-empty{visibility:hidden}

/* ===== REWARD CARD ===== */
.reward-right{display:flex;flex-direction:column;align-items:center;gap:var(--s1);flex-shrink:0}
.reward-price{font-size:15px;font-weight:800;color:var(--purple);display:flex;align-items:center;gap:var(--s1)}
.reward-price-locked{color:var(--text-tertiary);opacity:.5}
.reward-btn{
  padding:var(--s2) var(--s3);border-radius:var(--r-md);font-size:12px;font-weight:700;
  cursor:pointer;transition:all var(--fast) var(--ease-spring);white-space:nowrap;
}
.reward-btn-buy{background:var(--purple);color:#fff}
.reward-btn-buy:active{transform:scale(.9)}
.reward-btn-nogp{background:var(--n150);color:var(--text-tertiary);cursor:default}
.reward-btn-owned{background:#f3e5f5;color:var(--purple);cursor:default}

/* Long-press delete */
.task-card.long-press{animation:cardShake .3s var(--ease-spring)}
@keyframes cardShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.task-card.deleting{opacity:.4;transform:scale(.95)}
.todo-footer{text-align:center;padding:var(--s2) 0}
.todo-footer-btn{font-size:12px;color:var(--text-tertiary);cursor:pointer;padding:var(--s1) var(--s3);border-radius:var(--r-md);transition:all var(--fast)}
.todo-footer-btn:hover{color:var(--primary);background:#f0f8e8}
.todo-time{font-size:11px;color:var(--text-tertiary);margin-top:2px;display:block}


/* ===== TASK CARD ===== */
.task-list{display:flex;flex-direction:column;gap:var(--s2);padding-bottom:var(--s2)}
.task-list.hidden{display:none}

.task-card{
  background:var(--surface);
  border-radius:12px;padding:var(--s3) var(--s3);
  display:flex;align-items:center;gap:var(--s2);
  cursor:pointer;transition:all var(--std) var(--ease-spring);
  border:2px solid transparent;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
  animation:cardSlide .35s var(--ease-spring) backwards;
}
.task-card:nth-child(1){animation-delay:0ms}
.task-card:nth-child(2){animation-delay:40ms}
.task-card:nth-child(3){animation-delay:80ms}
.task-card:nth-child(4){animation-delay:120ms}
.task-card:nth-child(5){animation-delay:160ms}
.task-card:nth-child(6){animation-delay:200ms}
.task-card:active{}
.task-card:hover{
  box-shadow:var(--shadow-md);
  border-color:var(--primary);
}

.task-card.completed{
  opacity:.7;
}
.task-card.completed .task-text{text-decoration:line-through;color:var(--text-tertiary);font-weight:400}

/* Check button */
.task-check{
  width:32px;height:32px;border-radius:var(--r-full);
  border:2.5px solid var(--border-light);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:14px;font-weight:700;
  background:transparent;color:transparent;
  transition:all var(--std) var(--ease-spring);
}
.task-card.completed .task-check{
  background:var(--primary);border-color:var(--primary);color:#fff;
  box-shadow:0 0 20px var(--primary-shadow);
  transform:scale(1.1);
}
.task-card[data-type="reward"] .task-check{border-color:var(--purple)}
.task-card[data-type="reward"].completed .task-check{background:var(--purple);border-color:var(--purple);color:#fff}

/* Task type icon */
.task-type-icon{
  font-size:28px;line-height:1;flex-shrink:0;
  width:32px;text-align:center;
}

.task-body{flex:1;min-width:0}
.task-text{font-size:16px;font-weight:700;line-height:1.3;color:var(--text)}
.task-meta{display:flex;gap:var(--s1);margin-top:var(--s1);flex-wrap:wrap;align-items:center}
/* Streak pill (right side of daily/todo cards) */
.streak-pill{
  display:flex;align-items:center;gap:2px;
  font-size:12px;font-weight:700;color:#e65100;
  background:#fff3e0;padding:var(--s1) var(--s2);border-radius:20px;
  margin-left:auto;flex-shrink:0;white-space:nowrap;
}

/* Tags */
.tag{
  font-size:11px;padding:var(--s1) var(--s2);border-radius:var(--r-sm);font-weight:700;
}
.tag-easy{background:#e8f5e9;color:#4caf50}
.tag-medium{background:#fff8e1;color:var(--orange)}
.tag-hard{background:#ffebee;color:var(--red)}
.streak-badge{
  background:#fff3e0;color:#e65100;
  font-size:11px;padding:var(--s1) var(--s2);border-radius:var(--r-sm);font-weight:700;
}
.price-tag{
  background:#f3e5f5;color:#7b1fa2;
  font-size:11px;padding:var(--s1) var(--s2);border-radius:var(--r-sm);font-weight:700;
}

/* ===== FLOATING SCORE ===== */
.float-score{
  position:absolute;right:-4px;top:4px;
  font-weight:800;font-size:12px;
  pointer-events:none;z-index:10;
  animation:floatUp 1s var(--ease-spring) forwards;
}
.float-score.exp{color:var(--primary)}
.float-score.gp{color:var(--orange)}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  50%{opacity:1;transform:translateY(-16px) scale(1.3)}
  100%{opacity:0;transform:translateY(-36px) scale(1)}
}

/* ===== CARD PULSE ANIMATION ===== */
@keyframes cardPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.02)}
  100%{transform:scale(.98)}
}
.task-card.pop{
  animation:cardPop .35s var(--ease-spring);
}

/* ===== REWARD SHOP ===== */
.reward-detail{font-size:11px;color:var(--text-tertiary);margin-top:var(--s1)}

/* ===== ADD BUTTON (FAB) ===== */
.add-btn-wrap{
  position:fixed;bottom:var(--s6);left:50%;transform:translateX(-50%);
  z-index:100;
}
.btn-add{
  width:58px;height:58px;border-radius:var(--r-full);
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;font-size:28px;font-weight:400;
  cursor:pointer;
  box-shadow:var(--shadow-primary);
  transition:all var(--std) var(--ease-spring);
  display:flex;align-items:center;justify-content:center;
}
.btn-add:hover{transform:scale(1.08);box-shadow:0 6px 28px var(--primary-shadow-lg),0 0 0 7px var(--primary-ring)}


/* ===== ADD SHEET ===== */
.add-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--overlay-light);
  backdrop-filter:blur(2px);
  z-index:200;display:none;
  align-items:flex-end;justify-content:center;
}
.add-overlay.show{display:flex}
.add-sheet{
  background:var(--surface);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:var(--s6) var(--s5) var(--s10);
  width:100%;max-width:480px;
  animation:slideUp .25s ease-out;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.add-sheet h3{
  font-size:18px;margin-bottom:var(--s4);text-align:center;
  color:var(--text);font-weight:800;
}
.add-sheet input,.add-sheet select{
  width:100%;padding:var(--s3) var(--s4);
  background:var(--n50);
  border:2px solid var(--border);
  border-radius:var(--r-md);font-size:15px;color:var(--text);
  outline:none;transition:border-color var(--fast) var(--ease-smooth);margin-bottom:var(--s3);
  font-family:inherit;
}
.add-sheet input:focus{border-color:var(--border-focus)}
.add-sheet input::placeholder{color:var(--text-muted)}
.add-sheet select option{background:var(--surface);color:var(--text)}
.add-sheet .row{display:flex;gap:var(--s2)}
.add-sheet .row select{flex:1}
.btn{
  padding:var(--s3) var(--s5);border:none;border-radius:var(--r-md);
  font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all var(--fast) var(--ease-smooth);
  width:100%;margin-top:var(--s2);
}
.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;
  box-shadow:var(--shadow-primary);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--primary-ring)}
.btn-ghost{background:var(--n100);color:var(--text-secondary)}
.add-sheet-actions{display:flex;gap:var(--s2);margin-top:var(--s2)}
.add-sheet-actions .btn{width:auto;margin-top:0}
.add-sheet-actions .btn-primary{flex:1}
.add-sheet-actions .btn-ghost{flex:0 0 auto;padding:var(--s3) var(--s5);border-radius:var(--r-md)}
.hdetail-actions{display:flex;flex-direction:column;gap:var(--s1);margin-top:var(--s3)}
.del-confirm-modal{padding:var(--s8) var(--s6)}
.del-confirm-icon{display:block;text-align:center;margin-bottom:var(--s2)}
.del-confirm-btn{width:100%}

/* ===== LEVEL UP MODAL ===== */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--overlay);
  backdrop-filter:blur(4px);
  z-index:300;display:none;
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--surface);
  border-radius:var(--r-2xl);padding:var(--s10) var(--s6);
  max-width:340px;width:88%;
  text-align:center;
  animation:popIn .4s var(--ease-spring);
  box-shadow:var(--shadow-xl);
}
@keyframes popIn{
  from{transform:scale(.3) translateY(60px);opacity:0}
  to{transform:scale(1) translateY(0);opacity:1}
}
.modal .big{font-size:72px;display:block;margin-bottom:var(--s3)}
.modal h2{font-size:26px;margin-bottom:var(--s2);color:var(--text);font-weight:800}
.modal p{color:var(--text-tertiary);font-size:14px;margin-bottom:var(--s6)}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  color:#fff;
  width:100%;
  box-shadow:0 4px 20px rgba(255,150,0,.4);
}

/* ===== TOAST ===== */
.toast-container{
  position:fixed;top:var(--s4);left:50%;transform:translateX(-50%);
  z-index:400;display:flex;flex-direction:column;gap:var(--s1);
  pointer-events:none;align-items:center;
}
.toast{
  background:rgba(60,60,60,.92);
  color:#fff;padding:var(--s3) var(--s5);border-radius:14px;
  font-weight:700;font-size:14px;white-space:nowrap;
  animation:toastIn var(--fast) var(--ease-smooth),toastOut var(--fast) var(--ease-smooth) 2.2s forwards;
  pointer-events:auto;
  box-shadow:var(--shadow-md);
}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* ===== CONFETTI ===== */
.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:500;overflow:hidden}
.confetti-piece{
  position:absolute;width:10px;height:10px;top:-12px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* ===== CARD ENTRANCE ANIMATION ===== */
@keyframes cardSlide{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== EMPTY STATE ===== */
.empty-state{
  text-align:center;padding:var(--s10) var(--s4);
  background:var(--surface);border-radius:var(--r-lg);
  box-shadow:var(--shadow-sm);
}
.empty-state .icon{margin-bottom:var(--s3)}
.empty-state p{font-size:14px;color:var(--text-tertiary);line-height:1.5}

/* ===== 习惯详情面板 ===== */
.hdetail-sheet{
  background:var(--surface);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:var(--s3) var(--s5) var(--s10);
  width:100%;max-width:480px;
  animation:slideUp .25s ease-out;
}
.hdetail-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--n200);margin:0 auto var(--s4);
}
.hdetail-head{display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s2)}
.hdetail-del{margin-left:auto;color:var(--n250);cursor:pointer;padding:var(--s1);border-radius:var(--r-full);transition:all var(--fast);display:flex;align-items:center}
.hdetail-del:hover{color:var(--red);background:rgba(255,75,75,.08)}

<script>
// ================================================================
// MINI-HABITS GAME ENGINE (保留原有核心逻辑)
// ================================================================

// --- 常量 ---
const MAX_LEVEL = 50;
const BEXP = 6, BGP = 1;
const MAX_TV = 21.27, MIN_TV = -47.27, DECAY = 0.9747, CLOSE = 0.00001;
const PMUL = { easy: 1, medium: 1.5, hard: 2 };
const STREAK_BONUS = 0.01;
const STREAK_MS = 7;

let _showDoneTodos = false;
const TITLES = [
  { l: 1, t: '萌芽新手' }, { l: 5, t: '坚持学徒' },
  { l: 10, t: '习惯小树' }, { l: 15, t: '一星达人' },
  { l: 21, t: '连击勇士' }, { l: 30, t: '二星达人' },
  { l: 42, t: '连击大师' }, { l: 50, t: '习惯之王' },
];



// --- 核心算法 ---
function clampV(v) { return Math.max(MIN_TV, Math.min(MAX_TV, v)); }
function calcDelta(v, d) { return DECAY ** clampV(v) * (d === 'down' ? -1 : 1); }
function calcRevDelta(v, d) {
  let c = clampV(v), t = c + DECAY ** c * (d === 'down' ? -1 : 1);
  while (true) { let x = t + DECAY ** t, d2 = c - x; if (Math.abs(d2) < CLOSE) break; t += d2 > 0 ? -d2 : d2; }
  return t - c;
}
function pmul(p) { return PMUL[p] ?? 1; }
function expToLv(l) { if (l < 5) return 25 * l; if (l === 5) return 150; return Math.round(((l ** 2) * 0.25 + 10 * l + 139.75) / 10) * 10; }
function getTitle(l) { let t = ''; for (const e of TITLES) { if (l >= e.l) t = e.t; else break; } return t; }
function streakMs(s) { return s > 0 && s % STREAK_MS === 0; }
function streakMul(s) { return 1 + s * STREAK_BONUS; }
function rd(v, d) { return Math.round(v * (10 ** d)) / (10 ** d); }
function gid() { return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }
function sameDay(ts) { const d = new Date(ts), n = new Date(); return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate(); }
function toDateStr(d) { return d.toISOString().slice(0, 10); }

// --- 任务创建 ---
function taskDef(b) {
  const t = { _id: gid(), type: b.type || 'habit', text: b.text || '新任务', notes: '', value: b.value ?? 0, priority: b.priority || 'easy', createdAt: new Date() };
  if (t.type === 'habit') { t.up = true; t.down = true; t.counterUp = 0; t.counterDown = 0; t.history = []; }
  if (t.type === 'daily') { t.completed = false; t.streak = 0; t.frequency = 'weekly'; t.repeat = { m: true, t: true, w: true, th: true, f: true, s: true, su: true }; t.startDate = new Date(); t.history = []; }
  if (t.type === 'todo') { t.completed = false; t.dateCompleted = null; t.checklist = []; }
  if (t.type === 'reward') { t.value = b.value ?? 20; }
  return t;
}

// --- 评分核心 ---
function scoreTask(user, task, dir = 'up', times = 1, cron = false) {
  const st = { exp: user.stats.exp, gp: user.stats.gp };
  if (task.type === 'reward' && task.value > user.stats.gp) throw Error('no_gp');
  const oldLvl = user._tmp?.leveledUp;
  user._tmp = {};
  if (oldLvl) user._tmp.leveledUp = oldLvl;

  if (task.type === 'habit') _sHabit(user, task, dir, times, cron, st);
  else if (task.type === 'daily') _sDaily(user, task, dir, times, cron, st);
  else if (task.type === 'todo') _sTodo(user, task, dir, times, cron, st);
  else if (task.type === 'reward') st.gp -= task.value;

  _upStats(user, st);
  user._tmp.delta = st.gp - (user._tmp._prevGp ?? user.stats.gp) + user.stats.gp;
}

function _chgVal(user, task, dir, times, cron) {
  let t = 0;
  for (let i = 0; i < times; i++) {
    const d = !cron && dir === 'down' ? calcRevDelta(task.value, dir) : calcDelta(task.value, dir);
    if (task.type !== 'reward') task.value += d;
    t += d;
  }
  return t;
}
function _addExp(st, task, delta, dir) {
  st.exp += Math.max(0, rd(delta * pmul(task.priority) * (dir === 'up' && task.streak ? streakMul(task.streak) : 1) * BEXP));
}
function _addGP(st, task, delta, dir) {
  st.gp += Math.max(0, rd(delta * pmul(task.priority) * (dir === 'up' && task.streak ? streakMul(task.streak) : 1) * BGP));
}
function _sHabit(u, t, dir, times, cron, st) {
  const d = _chgVal(u, t, dir, times, cron);
  if (d > 0) { _addExp(st, t, d, dir); _addGP(st, t, d, dir); }
  if (dir === 'up') t.counterUp = (t.counterUp || 0) + times; else t.counterDown = (t.counterDown || 0) + times;
  // 连击：每天至少做一次才计数
  if (dir === 'up' && times > 0) {
    const today = toDateStr(new Date());
    const last = t.history && t.history.length > 0 ? toDateStr(new Date(t.history[t.history.length - 1].date)) : null;
    if (last !== today) { t.streak = (t.streak || 0) + 1; }
    if (streakMs(t.streak)) u._tmp.streakMs = t.streak;
  }
  t.history = t.history || [];
  const l = t.history[t.history.length - 1];
  if (l && sameDay(l.date)) { l.value = t.value; l.scoredUp = (l.scoredUp || 0) + (dir === 'up' ? times : 0); l.scoredDown = (l.scoredDown || 0) + (dir === 'down' ? times : 0); }
  else t.history.push({ date: Date.now(), value: t.value, scoredUp: dir === 'up' ? times : 0, scoredDown: dir === 'down' ? times : 0 });
}
function _sDaily(u, t, dir, times, cron, st) {
  if (cron) { _chgVal(u, t, dir, times, cron); t.streak = 0; t.completed = false; }
  else {
    const d = _chgVal(u, t, dir, times, cron);
    if (dir === 'up') {
      _addExp(st, t, d, dir); _addGP(st, t, d, dir);
      t.streak = (t.streak || 0) + 1; t.completed = true;
      t.history = t.history || []; t.history.push({ date: Date.now(), value: t.value, completed: true });
      if (streakMs(t.streak)) u._tmp.streakMs = t.streak;
    } else {
      t.streak = Math.max(0, (t.streak || 0) - 1); t.completed = false;
      if (t.history && t.history.length > 0) t.history.pop();
    }
  }
}
function _sTodo(u, t, dir, times, cron, st) {
  if (dir === 'up') {
    t.completed = true; t.dateCompleted = new Date();
    const d = _chgVal(u, t, dir, 1, cron); _addExp(st, t, d, dir); _addGP(st, t, d, dir);
  } else { t.completed = false; t.dateCompleted = null; _chgVal(u, t, dir, 1, cron); }
}
function _upStats(user, st) {
  user.stats.gp = Math.max(0, rd(st.gp)); user.stats.exp = Math.max(0, st.exp);
  let e = st.exp, en = expToLv(user.stats.lvl);
  if (e < en) return;
  const il = user.stats.lvl; let lv = false;
  while (e >= en) {
    e -= en;
    if (user.stats.lvl >= MAX_LEVEL) { user.stats.lvl = MAX_LEVEL; break; }
    user.stats.lvl += 1; lv = true;
    const nt = getTitle(user.stats.lvl);
    if (nt && user.stats.title !== nt) user.stats.title = nt;
    en = expToLv(user.stats.lvl);
  }
  user.stats.exp = rd(e);
  if (lv) {
    if (!user._tmp) user._tmp = {};
    if (!user._tmp.leveledUp) user._tmp.leveledUp = [];
    user._tmp.leveledUp.push({ il, nl: user.stats.lvl, title: user.stats.title });
  }
}

// ================================================================
// APP STATE
// ================================================================
const state = {
  user: { _id: 'hero', stats: { lvl: 1, exp: 0, gp: 0, title: '萌芽新手' }, _tmp: {} },
  tasks: [],
  tab: 'habits',
  todayDone: 0,

  streak: 0,
  dayCount: 1,
  hearts: 5,
  lastHeartsCheck: null,
  _todoDate: null,
};

// --- 示例任务（四年级适用） ---
const SAMPLES = [
  // 习惯
  { type: 'habit', text: '跳绳 10 个' },
  { type: 'habit', text: '练字 3 个字' },

  { type: 'habit', text: '喝水一杯' },
  { type: 'habit', text: '做口算 3 道题' },
  { type: 'habit', text: '背 1-2 个英语单词' },
  { type: 'habit', text: '收拾书包（睡前）' },
  { type: 'habit', text: '读 2 页书' },
  { type: 'habit', text: '做一件家务' },
  { type: 'habit', text: '写一句话日记' },
  { type: 'habit', text: '离开房间扔掉一个垃圾' },
  // 待办
  { type: 'todo', text: '语文作业' },
  { type: 'todo', text: '数学作业' },
  { type: 'todo', text: '英语作业' },
  { type: 'todo', text: '科学作业' },
  { type: 'todo', text: '整理房间' },
  { type: 'todo', text: '给家人做一张贺卡' },
  // 商店
  { type: 'reward', text: '多看 20 分钟动画', value: 20 },
  { type: 'reward', text: '选一个小零食', value: 15 },
  { type: 'reward', text: '周末去游乐场', value: 80 },
  { type: 'reward', text: '买一个新文具', value: 50 },
];

// ================================================================
// AUDIO (Web Audio API)
// ================================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = true;

function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playTone(freq, dur, type = 'sine', vol = 0.3) {
  if (!soundEnabled) return;
  try {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
// 多邻国风格音效
function playToneChain(notes, vol = 0.25) {
  notes.forEach(([freq, delay, dur, type]) => {
    setTimeout(() => playTone(freq, dur || 0.12, type || 'sine', vol), delay);
  });
}
function playTap() { playTone(880, 0.04, 'sine', 0.1); }                           // 按钮轻触
function playPop() { playTone(660, 0.06, 'sine', 0.12); }                          // 弹窗打开
function playTask() { playToneChain([[523,0,0.08],[659,60,0.08],[784,120,0.14]], 0.2); }  // 完成任务 ding
function playComplete() { playToneChain([[784,0,0.1],[988,80,0.1],[1175,160,0.25]], 0.22); } // 大完成
function playCoin() { playToneChain([[1319,0,0.06],[1568,50,0.06],[1760,100,0.1]], 0.15); }  // 金币声
function playUpgrade() { playToneChain([[523,0,0.12],[659,100,0.12],[784,200,0.12],[1047,300,0.35]], 0.25); }
function playHeartLost() { playTone(200, 0.3, 'sawtooth', 0.15); setTimeout(() => playTone(160, 0.4, 'sawtooth', 0.1), 150); }
function playNoGP() { playTone(300, 0.2, 'square', 0.1); setTimeout(() => playTone(250, 0.3, 'square', 0.08), 100); }
function playStreak() { playToneChain([[784,0,0.1,],[988,80,0.1],[1175,160,0.1],[1319,240,0.35]], 0.28); }
function playCorrect() { playToneChain([[660,0,0.06],[880,60,0.06],[1047,120,0.18]], 0.2); } // 正确反馈

// ================================================================
// PERSISTENCE
// ================================================================
function saveState() {
  localStorage.setItem('mh_user', JSON.stringify(state.user));
  localStorage.setItem('mh_tasks', JSON.stringify(state.tasks));
  localStorage.setItem('mh_meta', JSON.stringify({
    todayDone: state.todayDone,
    streak: state.streak,
    dayCount: state.dayCount,

function getHabitTips(text, task) {
  // 优先使用已缓存的 AI 建议
  if (task && task._aiTips) return task._aiTips;
  // 先查预定义建议
  for (const [key, tips] of Object.entries(HABIT_TIPS)) {
    if (key !== 'default' && text.includes(key)) return tips;
  }
  // 自动生成：根据习惯名字推断结构化建议
  return generateHabitTips(text);
}
function generateHabitTips(text) {
  const t = text.toLowerCase();
  // 检测类别
  const isExercise = /跳|跑|运动|健身|引体|俯卧|深蹲|跳绳|仰卧|拉伸/.test(t);
  const isStudy = /背|读|书|单词|英语|语文|数学|学习|作业|练字|口算|古诗/.test(t);
  const isHealth = /水|喝|睡|早起|刷牙|洗脸|护|眼|维生素/.test(t);
  const isChore = /整理|打扫|拖|擦|洗|垃圾|叠|收|摆/.test(t);
  const isMind = /日记|冥想|写|画|练/.test(t);

  // 触发时机
  let prompt;
  if (isExercise) prompt = '换好运动装备／站起来活动时';
  else if (isStudy) prompt = '坐到书桌前／合上作业本后';
  else if (isHealth) prompt = '早上起床后／临睡前';
  else if (isChore) prompt = '吃完饭站起来时／看到需要整理时';
  else if (isMind) prompt = '关灯躺好／安静下来时';
  else prompt = '做完某件固定事后（如刷牙后／放学回家后）';

  // 微小动作 + 建议次数 + 进阶
  let times, action, next;
  if (isExercise) {
    times = '每天 1 次';
    action = `先做 3 个${text.replace(/[0-9]+/g,'').trim()}，做完就算成功`;
    next = '逐渐增加数量';
  } else if (isStudy) {
    times = '每天 1 次';
    action = `只做 2 分钟，时间到了就停`;
    next = '延长到 5 分钟';
  } else if (isHealth) {
    times = '每天 1-2 次';
    action = `做完就停下，不要求标准`;
    next = '坚持两周后增加频率';
  } else if (isChore) {
    times = '每天 1 件';
    action = `只做 1 分钟，选最简单的开始`;
    next = '扩大到整个区域';
  } else if (isMind) {
    times = '每天 1 次';
    action = `做 1 分钟就好，多了不贪`;
    next = '延长到 5 分钟';
  } else {
    times = '每天 1-2 次';
    action = `先做 2 分钟，做完就算成功`;
    next = '坚持一周后增加时长';
  }

  return { times, prompt, action, next };
}

function fmtTime(ts) {
  const d = new Date(ts);

  const taskDay = toDateStr(d);
  if (taskDay === today) return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const yesterday = toDateStr(new Date(now - 86400000));
  if (taskDay === yesterday) return `昨天 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `${d.getMonth()+1}/${d.getDate()}`;

    document.querySelectorAll(`.task-card[data-id="${id}"]`).forEach(card => {

  }
  if (task.type === 'habit') { clickHabit(task._id, 'up'); return; }
  if (task.type === 'daily') { if (task.completed) { scoreTask(state.user, task, 'down'); render(); } else { _doComplete(task); } render(); checkUp(); return; }

}

function clickHabit(id, dir) {
  const task = state.tasks.find(t => t._id === id);
  if (!task) return;
  if (state.hearts <= 0) { showToast('爱心耗尽！先恢复再说吧'); return; }
  const beforeGP = state.user.stats.gp;
  const beforeExp = state.user.stats.exp;
  scoreTask(state.user, task, dir);
  if (dir === 'up') {
    state.todayDone++;
    const gpGain = rd(state.user.stats.gp - beforeGP);
    const expGain = rd(state.user.stats.exp - beforeExp);
    if (expGain > 0) spawnFloat(task, 'exp', beforeExp);
    if (gpGain > 0) spawnFloat(task, 'gp', beforeGP);
    playTask();
  }
  // 只更新计数字段和进度，不重新渲染整个列表
  const today = toDateStr(new Date());
  const todayCount = (task.history || []).filter(h => toDateStr(new Date(h.date)) === today).reduce((s, h) => s + (h.scoredUp || 0), 0);
  document.querySelectorAll(`.task-card[data-id="${id}"] .habit-count`).forEach(el => {
    el.textContent = `今天 ×${todayCount || 0}`;
    el.classList.toggle('habit-count-empty', !todayCount);
  });
  document.getElementById('statGp').textContent = Math.floor(state.user.stats.gp) || 0;
  renderExp();
  saveState();
  _popCard(task._id);
  checkUp();
}

function _popCard(id) {}

function _doComplete(task) {
  const beforeGP = state.user.stats.gp;
  const beforeExp = state.user.stats.exp;
  if (state.hearts <= 0) { showToast('爱心耗尽！先恢复再说吧'); return; }
  scoreTask(state.user, task, 'up');
  state.todayDone++;
  const gpGain = rd(state.user.stats.gp - beforeGP);
  const expGain = rd(state.user.stats.exp - beforeExp);
  if (expGain > 0) spawnFloat(task, 'exp', beforeExp);
  if (gpGain > 0) spawnFloat(task, 'gp', beforeGP);
  monkeyHappy(); // 完成任务猴子开心
  playTask();
  // Streak tracking
  if (task.type === 'daily') {
    const today = toDateStr(new Date());
    const yesterday = toDateStr(new Date(Date.now() - 86400000));
    if (state.lastHeartsCheck === yesterday || state.lastHeartsCheck === null) {
      state.streak++;
    } else if (state.lastHeartsCheck !== today) {
      state.streak = 1;
    }
    state.lastHeartsCheck = today;
    state.dayCount++;
    if (streakMs(state.streak)) {
      playStreak();
      showModal('flame', `连续 ${state.streak} 天！`, `超级奖励！+50 金币 +1 爱心 +50经验`, '太厉害了！');
      state.user.stats.gp += 50;
      gainHeart();
      state.user.stats.exp += 50;
      render();
    }
    _checkHeartsPenalty();
  }
}

function _checkHeartsPenalty() {
  const today = toDateStr(new Date());
  if (state.lastHeartsCheck === today) return;
  const dailies = state.tasks.filter(t => t.type === 'daily');
  const allDone = dailies.every(t => t.completed);
  if (!allDone && state.lastHeartsCheck !== null) {
    const yesterday = toDateStr(new Date(Date.now() - 86400000));
    if (state.lastHeartsCheck !== today) {
      if (loseHeart()) {
        showToast('昨日有未完成的每日任务，扣了1颗爱心');
      }
    }
  }
}

function spawnFloat(task, type, before) {
  const cards = document.querySelectorAll(`.task-card[data-id="${task._id}"]`);
  if (cards.length === 0) return;
  const card = cards[0];
  const el = document.createElement('div');
  el.className = `float-score ${type}`;
  const val = type === 'exp' ? rd(state.user.stats.exp - before) : rd(state.user.stats.gp - before);
  el.textContent = type === 'exp' ? `+${val}⭐` : `+${val}🪙`;
  card.querySelector('.task-body')?.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function checkUp() {
  const info = state.user._tmp?.leveledUp;
  if (info && info.length > 0) {
    const last = info[info.length - 1];
    // lvlEmoji is already the monkey SVG, just animate it
    const lvlEmoji = document.getElementById('lvlEmoji');
    lvlEmoji.style.animation = 'none';
    void lvlEmoji.offsetHeight; // reflow
    lvlEmoji.style.animation = 'lvlMonkeyPop .6s var(--ease-spring)';
    document.getElementById('lvlTitle').textContent = `Lv.${last.nl}！${last.title || ''}`;
    document.getElementById('lvlDesc').textContent = `太棒了！你已经养成了好习惯，继续加油！`;
    document.getElementById('lvlModal').classList.add('show');
    monkeyHappy(); // 顶部猴子也兴奋一下
    confetti();
    playUpgrade();
    if (state.user._tmp.streakMs) {
      setTimeout(() => showToast(`连击 ${state.user._tmp.streakMs} 天！太厉害了！`), 600);
    }
  }
}
let _deletedTask = null;
let _deleteTimer = null;
function deleteTask(id) {
  playTap();
  const idx = state.tasks.findIndex(t => t._id === id);
  if (idx === -1) return;
  _deletedTask = state.tasks.splice(idx, 1)[0];
  clearTimeout(_deleteTimer);
  saveState();
  render();
  const toast = document.createElement('div');
  toast.className = 'toast undo-toast';
  toast.innerHTML = `已删除「${esc(_deletedTask.text)}」<button class="undo-btn" onclick="undoDelete()">撤销</button>`;
  document.getElementById('toastContainer').appendChild(toast);
  _deleteTimer = setTimeout(() => { _deletedTask = null; toast.remove(); }, 5000);
}
function undoDelete() {
  if (!_deletedTask) return;
  state.tasks.push(_deletedTask);
  _deletedTask = null;
  clearTimeout(_deleteTimer);
  render();
  showToast('↩️ 已恢复');
  playCorrect();
}

// ===== MONKEY INTERACTION =====


function monkeyHappy() {}
function monkeyGreet() {}
function petMonkey() { showToast('🐒 嘻嘻～'); playCorrect(); }
function toggleDoneTodos() { playTap(); _showDoneTodos = !_showDoneTodos; renderTasks(); }
function updateTodoFooter() {
  const el = document.getElementById('todosList');
  const allTodos = state.tasks.filter(t => t.type === 'todo');
  const doneTodos = allTodos.filter(t => t.completed);
  // 移除旧的 footer
  el.querySelectorAll('.todo-footer').forEach(f => f.remove());
  if (doneTodos.length > 0) {
    const footer = document.createElement('div');
    footer.className = 'todo-footer';
    footer.innerHTML = _showDoneTodos
      ? `<span class="todo-footer-btn" onclick="toggleDoneTodos()">▲ 隐藏已完成（${doneTodos.length} 项）</span>`
      : `<span class="todo-footer-btn" onclick="toggleDoneTodos()">▼ 已完成（${doneTodos.length} 项）</span>`;
    el.appendChild(footer);
  }
  // 隐藏/显示已完成卡片
  el.querySelectorAll('.task-card.completed').forEach(card => {
    card.style.display = _showDoneTodos ? '' : 'none';
  });
}
function confirmDeleteDetail() {
  if (!_hDetailId) return;
  document.getElementById('delConfirmOverlay').classList.add('show');
}
function doDeleteDetail() {
  if (!_hDetailId) return;
  playTap();
  deleteTask(_hDetailId);
  document.getElementById('habitDetail').classList.remove('show');
  document.getElementById('delConfirmOverlay').classList.remove('show');
  _hDetailId = null;
}
function cancelDeleteDetail() {
  playTap();
  document.getElementById('delConfirmOverlay').classList.remove('show');
}

function closeLvlModal() { playTap(); document.getElementById('lvlModal').classList.remove('show'); }

// ===== ADD SHEET =====
function showAddSheet() {
  const tabLabels = { habits: '新习惯', todos: '新待办', rewards: '新奖励' };
  const isReward = state.tab === 'rewards';
  document.getElementById('addSheetTitle').textContent = tabLabels[state.tab] || '新习惯';
  document.getElementById('rewardPriceRow').style.display = isReward ? 'flex' : 'none';
  document.getElementById('newPrice').value = 20;
  document.getElementById('addOverlay').classList.add('show');
  document.getElementById('newText').focus();
}
function hideAddSheet(e) { if (e && e.target !== e.currentTarget) return; playTap(); document.getElementById('addOverlay').classList.remove('show'); }
function addTask() {
  const text = document.getElementById('newText').value.trim();
  if (!text) { showToast('请输入任务名称'); return; }
  const tabType = { habits: 'habit', todos: 'todo', rewards: 'reward' };
  const type = tabType[state.tab] || 'habit';
  const value = type === 'reward' ? parseInt(document.getElementById('newPrice').value) || 20 : undefined;
  const task = taskDef({ type, text, value });
  state.tasks.push(task);
  document.getElementById('newText').value = '';
  hideAddSheet();
  showToast(`已添加「${text}」`);
  render();
}


// ===== TOAST =====
let toastTimeout;
function showToast(msg) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ===== CONFETTI =====
function confetti() {
  const c = document.createElement('div');
  c.className = 'confetti-container';
  document.body.appendChild(c);
  const colors = ['#58CC02','#1cb0f6','#ff9600','#c054f7','#ff4b4b','#ffd700','#00cfff','#A150F7'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (Math.random() * 8 + 4) + 'px';
    p.style.height = (Math.random() * 8 + 4) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    p.style.animationDelay = (Math.random() * 0.8) + 's';
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 4000);
}

// ===== MODAL =====
function showModal(iconName, title, desc, btnText) {
  const el = document.getElementById('lvlEmoji');
  if (iconName.startsWith('<')) {
    el.innerHTML = iconName;
  } else {
    el.innerHTML = `<i data-lucide="${iconName}" style="width:72px;height:72px;color:var(--primary)"></i>`;
  }
  document.getElementById('lvlTitle').textContent = title;
  document.getElementById('lvlDesc').textContent = desc;
  document.querySelector('.btn-gold').textContent = btnText;
  if(typeof lucide!=="undefined"&&lucide.createIcons)lucide.createIcons();
  document.getElementById('lvlModal').classList.add('show');
  confetti();
}

// ===== SOUND TOGGLE =====
document.getElementById('settingsBtn').addEventListener('click', () => {
  showToast('⚙️ 设置功能开发中');
});

// ===== MODAL CLOSE =====
document.getElementById('lvlModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) document.getElementById('lvlModal').classList.remove('show');
});

// ===== INIT =====
loadState();
// 每日重置待办
const todayStr = toDateStr(new Date());
if (state._todoDate !== todayStr) {
  state.tasks.filter(t => t.type === 'todo').forEach(t => { t.completed = false; t.dateCompleted = null; });
  state._todoDate = todayStr;
}
// 首次使用：加载示例任务
if (state.tasks.length === 0) {
  SAMPLES.forEach(t => state.tasks.push(taskDef(t)));
} else {
  // 迁移：移除旧名称的重复习惯（已被改名）
  const oldNames = ['背 5 个英语单词','跳绳 50 个','练字 5 分钟','做口算一页','阅读 15 分钟'];
  state.tasks = state.tasks.filter(t => !oldNames.includes(t.text));
  // 检查并补充缺少的示例任务
  const existingTexts = new Set(state.tasks.map(t => t.text));
  SAMPLES.forEach(t => {
    if (!existingTexts.has(t.text)) {
      state.tasks.push(taskDef(t));
    }
  });
}
soundEnabled = localStorage.getItem('mh_sound') !== 'off';
saveState();
document.getElementById('expBarFill').style.width = '0%';
render();
if(typeof lucide!=="undefined"&&lucide.createIcons)lucide.createIcons();
saveState();

console.log('朱古力豆 · Lucide 图标系统');

// ===== URL 路由（hash-based） =====
window.addEventListener('hashchange', () => {
  const tab = location.hash.replace('#', '') || 'habits';
  if (['habits','todos','rewards'].includes(tab)) switchTab(tab);
});

// 初始加载时读取 hash
const initTab = location.hash.replace('#', '') || 'habits';
if (['habits','todos','rewards'].includes(initTab) && initTab !== state.tab) {
  switchTab(initTab);
}
