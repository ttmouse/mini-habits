<script>
// APP VERSION — 每次有前端更新时手动 +1，自动触发清缓存重载
const APP_VERSION = '3';
try {
  const prev = localStorage.getItem('mh_ver');
  if (prev && prev !== APP_VERSION) {
    // 版本变了 → 清空 SW 缓存和注册，强制从网络加载
    if ('caches' in window) {
      caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))));
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs =>
        Promise.all(regs.map(r => r.unregister()))
      );
    }
  }
  localStorage.setItem('mh_ver', APP_VERSION);
} catch(e) {}
</script>
<script src="lucide.js"></script>
<style>
/* ===== DESIGN TOKENS ===== */
:root{
  /* Neutral palette (warm zinc) */
  --n50:#f7f6f3;
  --n100:#f2f0eb;
  --n150:#e8e5df;
  --n200:#e4e4e7;
  --n250:#d4d1ca;
  --n300:#a8a49d;
  --n400:#8a8680;
  --n500:#6d6964;
  --n600:#55514c;
  --n700:#3c3c3c;
  --n800:#27272a;
  --n900:#1a1a18;

  /* Semantic colors */
  --primary:#58CC02;
  --primary-light:#46a302;
  --primary-dark:#3a8a02;
  --primary-ring:rgba(88,204,2,.35);
  --primary-shadow:rgba(88,204,2,.3);
  --primary-shadow-lg:rgba(88,204,2,.5);
  --blue:#1cb0f6;
  --orange:#ff9600;
  --orange-dark:#ff7800;
  --purple:#c054f7;
  --red:#FF4B4B;
  --gold:#ff9600;
  --gold-dark:#ff7800;

  /* Surfaces */
  --bg:#f2f0eb;
  --surface:#ffffff;
  --surface-elevated:#ffffff;
  --overlay:rgba(0,0,0,.5);
  --overlay-light:rgba(0,0,0,.4);

  /* Text tokens */
  --text:#3c3c3c;
  --text-secondary:#6d6964;
  --text-tertiary:#a8a49d;
  --text-muted:#bbb;

  /* Border tokens */
  --border:#e4e4e7;
  --border-light:#dcdcdc;
  --border-focus:#58CC02;

  /* Shadow tokens — 5 levels */
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12);
  --shadow-xl:0 20px 60px rgba(0,0,0,.30);
  --shadow-primary:0 4px 20px var(--primary-shadow-lg),0 0 0 5px var(--primary-ring);

  /* Radius tokens */
  --r-sm:6px;
  --r-md:12px;
  --r-lg:16px;
  --r-xl:24px;
  --r-2xl:28px;
  --r-full:50%;

  /* Spacing tokens (4px base) */
  --s1:4px;
  --s2:8px;
  --s3:12px;
  --s4:16px;
  --s5:20px;
  --s6:24px;
  --s8:32px;
  --s10:40px;
  --s12:48px;

  /* Motion tokens */
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-smooth:cubic-bezier(.16,1,.3,1);
  --fast:150ms;
  --std:250ms;
  --slow:400ms;
}

/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;overflow:hidden;margin:0;padding:0;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;
  background:var(--bg);
  color:var(--text);
  touch-action:manipulation;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:4px}
button{border:none;cursor:pointer;font-family:inherit;transition:all var(--std) var(--ease-smooth)}
button:active{transform:scale(.97)}
.btn-add:active{transform:scale(.92)}
.task-check:active{transform:scale(.9)}
button:disabled{opacity:.4!important;pointer-events:none}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:var(--r-sm)}

/* ===== TOP BAR ===== */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--s3) var(--s4);
  background:var(--surface);
  border-radius:0 0 var(--r-xl) var(--r-xl);
  box-shadow:var(--shadow-md);
  position:sticky;top:0;z-index:100;
  margin:0 calc(-1 * var(--s4));
}
.app-title{font-size:18px;font-weight:800;color:var(--text);flex-shrink:0}

/* Monkey in level-up modal */
.lvl-monkey{
  width:120px;height:140px;display:block;margin:0 auto var(--s2);
  animation:lvlMonkeyPop .6s var(--ease-spring);
}
@keyframes lvlMonkeyPop{
  0%{transform:scale(0) rotate(-10deg);opacity:0}
  60%{transform:scale(1.1) rotate(3deg);opacity:1}
  100%{transform:scale(1) rotate(0)}
}
.modal .big{font-size:72px;display:block;margin-bottom:var(--s3)}
.top-center{display:flex;align-items:center;gap:var(--s3)}
.hearts-display{
  display:flex;gap:var(--s1);font-size:26px;
  line-height:1;
}
.stat-pill{
  font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:var(--s1);
  background:var(--n50);
  padding:var(--s1) var(--s3);border-radius:var(--r-xl);
  color:var(--text-secondary);
}

/* ===== App Container ===== */
.app{max-width:480px;margin:0 auto;padding:0 var(--s4);display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.task-lists-scroll{flex:1;overflow-y:auto;padding-bottom:100px;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.task-lists-scroll::-webkit-scrollbar{display:none}
.task-lists-scroll .task-list{padding-bottom:0}



/* ===== 合并卡片：进度 + 猴子 ===== */
.merged-card{
  display:flex;align-items:flex-start;gap:var(--s1);
  padding:var(--s5) var(--s4) var(--s6);
  margin:var(--s2) calc(-1 * var(--s4)) 0;
  overflow:visible;
}

.merged-avatar{flex-shrink:0;width:140px;height:90px;display:flex;align-items:flex-start;justify-content:center;overflow:visible}
.merged-avatar img{width:140px;height:140px;display:block;object-fit:contain;cursor:pointer;margin-top:-24px;margin-left:-10px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.1));transform:rotate(-3deg)}
.merged-body{flex:1;min-width:0;padding-top:19px;margin-left:-20px}
.merged-top{display:flex;align-items:center;margin-bottom:var(--s1)}
.merged-stats{display:flex;gap:var(--s1);margin-top:var(--s1)}
.merged-stat{font-size:11px;font-weight:600;color:var(--text-secondary);background:var(--n50);padding:2px 8px;border-radius:8px}
.merged-date{font-size:18px;font-weight:900;color:var(--text);margin-bottom:10px;line-height:1.3}
.daily-progress{margin-bottom:6px}
.daily-progress-bar{background:var(--n150);border-radius:20px;height:8px;overflow:hidden}
.daily-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--orange),var(--gold-dark));border-radius:20px;transition:width .4s ease-out}
.daily-progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text-tertiary);margin-top:var(--s1)}


.lvl-badge{
  font-size:12px;font-weight:700;color:var(--text-secondary);
  display:flex;align-items:center;gap:var(--s1);
}


.progress-body{flex:1;min-width:0}



/* ===== TABS ===== */
.tabs{
  display:flex;gap:var(--s1);margin-bottom:var(--s3);
  background:var(--n150);
  border-radius:14px;padding:var(--s1);
}
.tab{
  flex:1;padding:var(--s3) var(--s1);border:none;border-radius:11px;
  font-size:13px;font-weight:700;cursor:pointer;
  background:transparent;color:var(--text-tertiary);
  transition:all var(--std) var(--ease-smooth);
  white-space:nowrap;
  display:flex;align-items:center;justify-content:center;gap:var(--s1);
}
.tab:hover{color:var(--text-secondary)}
.tab.active{
  background:var(--surface);
  color:var(--text);
  box-shadow:var(--shadow-sm);
}
.tab .badge{
  background:var(--red);color:#fff;font-size:10px;
  padding:var(--s1) var(--s2);border-radius:8px;font-weight:700;
}

/* ===== HABIT CARD (多邻国风格) ===== */
.task-habit{justify-content:space-between;gap:var(--s2)}
.task-habit .task-body{flex:0 1 auto}
.habit-right{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.habit-btn-big{
  width:44px;height:44px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;font-family:inherit;
  background:var(--primary);color:#fff;
  cursor:pointer;transition:all var(--fast) var(--ease-spring);
  line-height:1;padding:0;
  box-shadow:0 4px 0 var(--primary-dark),0 6px 12px var(--primary-shadow-lg);
  border:none;
  position:relative;
  transform:translateY(-2px);
}
.habit-btn-big:active{
  transform:translateY(2px);
  box-shadow:0 1px 0 var(--primary-dark),0 3px 8px var(--primary-shadow-lg);
}

.habit-count{
  font-size:11px;font-weight:700;color:var(--primary-dark);
  white-space:nowrap;height:16px;line-height:16px;
}
.habit-count-empty{visibility:hidden}

/* ===== REWARD CARD ===== */
.reward-right{display:flex;flex-direction:column;align-items:center;gap:var(--s1);flex-shrink:0}
.reward-price{font-size:15px;font-weight:800;color:var(--purple);display:flex;align-items:center;gap:var(--s1)}
.reward-price-locked{color:var(--text-tertiary);opacity:.5}
.reward-btn{
  padding:var(--s2) var(--s3);border-radius:var(--r-md);font-size:12px;font-weight:700;
  cursor:pointer;transition:all var(--fast) var(--ease-spring);white-space:nowrap;
}
.reward-btn-buy{background:var(--purple);color:#fff}
.reward-btn-buy:active{transform:scale(.9)}
.reward-btn-nogp{background:var(--n150);color:var(--text-tertiary);cursor:default}
.reward-btn-owned{background:#f3e5f5;color:var(--purple);cursor:default}

/* Long-press delete */
.task-card.long-press{animation:cardShake .3s var(--ease-spring)}
@keyframes cardShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.task-card.deleting{opacity:.4;transform:scale(.95)}
.todo-footer{text-align:center;padding:var(--s2) 0}
.todo-footer-btn{font-size:12px;color:var(--text-tertiary);cursor:pointer;padding:var(--s1) var(--s3);border-radius:var(--r-md);transition:all var(--fast)}
.todo-footer-btn:hover{color:var(--primary);background:#f0f8e8}
.todo-time{font-size:11px;color:var(--text-tertiary);margin-top:2px;display:block}
.history-item{padding:var(--s3) var(--s4);display:flex;align-items:center;gap:var(--s2)}
.history-body{flex:1;min-width:0;display:flex;flex-direction:column}
.history-text{font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-time{font-size:11px;color:var(--text-tertiary);margin-top:1px}
.history-label{font-size:12px;color:var(--text-secondary);flex-shrink:0}
.history-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-tertiary)}
.history-del{font-size:16px;color:var(--n250);cursor:pointer;padding:var(--s1);border-radius:var(--r-full);line-height:1;transition:all var(--fast);flex-shrink:0}
.history-del:hover{color:var(--red);background:rgba(255,75,75,.08)}
.history-date-label{padding:var(--s2) var(--s1) var(--s1);font-size:12px;font-weight:700;color:var(--text-tertiary)}


/* ===== TASK CARD ===== */
.task-list{display:flex;flex-direction:column;gap:var(--s2);padding-bottom:var(--s2)}
.task-list.hidden{display:none}

.task-card{
  background:var(--surface);
  border-radius:12px;padding:var(--s3) var(--s3);
  display:flex;align-items:center;gap:var(--s2);
  cursor:pointer;transition:all var(--std) var(--ease-spring);
  border:2px solid transparent;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
  animation:cardSlide .35s var(--ease-spring) backwards;
}
.task-card:nth-child(1){animation-delay:0ms}
.task-card:nth-child(2){animation-delay:40ms}
.task-card:nth-child(3){animation-delay:80ms}
.task-card:nth-child(4){animation-delay:120ms}
.task-card:nth-child(5){animation-delay:160ms}
.task-card:nth-child(6){animation-delay:200ms}
.task-card:active{}
.task-card:hover{
  box-shadow:var(--shadow-md);
  border-color:var(--primary);
}

.task-card.completed{
  opacity:.7;
}
.task-card.completed .task-text{text-decoration:line-through;color:var(--text-tertiary);font-weight:400}

/* Check button */
.task-check{
  width:32px;height:32px;border-radius:var(--r-full);
  border:2.5px solid var(--border-light);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:14px;font-weight:700;
  background:transparent;color:transparent;
  transition:all var(--std) var(--ease-spring);
}
.task-card.completed .task-check{
  background:var(--primary);border-color:var(--primary);color:#fff;
  box-shadow:0 0 20px var(--primary-shadow);
  transform:scale(1.1);
}
.task-card[data-type="reward"] .task-check{border-color:var(--purple)}
.task-card[data-type="reward"].completed .task-check{background:var(--purple);border-color:var(--purple);color:#fff}

/* Task type icon */
.task-type-icon{
  width:52px;height:52px;display:flex;
  align-items:center;justify-content:center;
  flex-shrink:0;
  background:var(--n100);border-radius:var(--r-md);
  color:var(--text-secondary);
}
.icon-task-type{width:26px;height:26px}

.task-body{flex:1;min-width:0}
.task-text{font-size:16px;font-weight:700;line-height:1.3;color:var(--text)}
.task-meta{display:flex;gap:var(--s1);margin-top:var(--s1);flex-wrap:wrap;align-items:center}
/* Streak pill (right side of daily/todo cards) */
.streak-pill{
  display:flex;align-items:center;gap:2px;
  font-size:12px;font-weight:700;color:#e65100;
  background:#fff3e0;padding:var(--s1) var(--s2);border-radius:20px;
  margin-left:auto;flex-shrink:0;white-space:nowrap;
}

/* Tags */
.tag{
  font-size:11px;padding:var(--s1) var(--s2);border-radius:var(--r-sm);font-weight:700;
}
.tag-easy{background:#e8f5e9;color:#4caf50}
.tag-medium{background:#fff8e1;color:var(--orange)}
.tag-hard{background:#ffebee;color:var(--red)}
.streak-badge{
  background:#fff3e0;color:#e65100;
  font-size:11px;padding:var(--s1) var(--s2);border-radius:var(--r-sm);font-weight:700;
}
.price-tag{
  background:#f3e5f5;color:#7b1fa2;
  font-size:11px;padding:var(--s1) var(--s2);border-radius:var(--r-sm);font-weight:700;
}

/* ===== FLOATING SCORE ===== */
.float-score{
  position:absolute;right:-4px;top:4px;
  font-weight:800;font-size:12px;
  pointer-events:none;z-index:10;
  animation:floatUp 1s var(--ease-spring) forwards;
}
.float-score.exp{color:var(--primary)}
.float-score.gp{color:var(--orange)}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  50%{opacity:1;transform:translateY(-16px) scale(1.3)}
  100%{opacity:0;transform:translateY(-36px) scale(1)}
}

/* ===== CARD PULSE ANIMATION ===== */
@keyframes cardPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.02)}
  100%{transform:scale(.98)}
}
.task-card.pop{
  animation:cardPop .35s var(--ease-spring);
}

/* ===== TODO TIMER ===== */
.task-timer{
  display:flex;align-items:center;gap:var(--s1);
  margin-left:auto;flex-shrink:0;
}
.task-timer-btn{
  display:flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  font-size:12px;font-weight:700;
  border:none;cursor:pointer;
  transition:all var(--fast) var(--ease-spring);
  white-space:nowrap;
}
.task-timer-btn-start{
  background:#e8f5e9;color:var(--primary);
}
.task-timer-btn-start:hover{
  background:var(--primary);color:#fff;
  box-shadow:0 2px 8px var(--primary-shadow);
}
.task-timer-btn-stop{
  background:#fff3e0;color:var(--orange-dark);
}
.task-timer-btn-stop:hover{
  background:var(--orange-dark);color:#fff;
  box-shadow:0 2px 8px rgba(255,150,0,.4);
}
.task-timer-elapsed{
  font-size:12px;font-weight:700;
  color:var(--orange-dark);
  font-variant-numeric:tabular-nums;
  min-width:48px;text-align:center;
}
.task-timer-summary{
  font-size:11px;color:var(--text-tertiary);
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
/* Running card glow */
.task-card.running{
  border-color:var(--orange);
  box-shadow:0 0 0 1px rgba(255,150,0,.15), 0 4px 12px rgba(255,150,0,.08);
  animation:runningPulse 2s ease-in-out infinite;
}
@keyframes runningPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(255,150,0,.15),0 4px 12px rgba(255,150,0,.08)}
  50%{box-shadow:0 0 0 3px rgba(255,150,0,.08),0 4px 16px rgba(255,150,0,.18)}
}

/* ===== FOCUS OVERLAY ===== */
.focus-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:400;display:none;
  align-items:center;justify-content:center;
  background:var(--overlay-light);
  backdrop-filter:blur(8px);
}
.focus-overlay.show{display:flex}
.focus-content{
  text-align:center;padding:var(--s10) var(--s8);
  max-width:380px;width:88%;
  background:var(--surface);
  border-radius:var(--r-2xl);
  box-shadow:var(--shadow-xl);
  animation:focusPop .4s var(--ease-spring);
}
@keyframes focusPop{
  from{opacity:0;transform:scale(.85) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.focus-mascot{margin-bottom:var(--s4)}
.focus-mascot img{
  width:80px;height:80px;object-fit:contain;
  animation:focusBounce 3s ease-in-out infinite;
}
@keyframes focusBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
.focus-task-label{
  font-size:12px;font-weight:700;color:var(--text-tertiary);
  letter-spacing:1px;margin-bottom:var(--s1);
}
.focus-task-name{
  font-size:24px;font-weight:800;color:var(--text);
  margin-bottom:var(--s6);line-height:1.3;
}
.focus-timer{
  font-size:64px;font-weight:800;color:var(--primary);
  font-variant-numeric:tabular-nums;
  letter-spacing:1px;
  margin-bottom:var(--s8);
}
.focus-stop-btn{
  display:inline-flex;align-items:center;gap:var(--s2);
  padding:var(--s3) var(--s8);border-radius:50px;
  font-size:16px;font-weight:700;
  background:var(--orange);color:#fff;
  border:none;cursor:pointer;
  transition:all var(--std) var(--ease-spring);
  box-shadow:var(--shadow-md);
}
.focus-stop-btn:hover{
  transform:scale(1.05);
  box-shadow:var(--shadow-lg);
}
.focus-stop-btn:active{
  transform:scale(.95);
}
.focus-hint{
  margin-top:var(--s6);
  font-size:12px;color:var(--text-tertiary);
}

/* ===== REWARD SHOP ===== */
.reward-detail{font-size:11px;color:var(--text-tertiary);margin-top:var(--s1)}

/* ===== ADD BUTTON (FAB) ===== */
.add-btn-wrap{
  position:fixed;bottom:var(--s6);left:50%;transform:translateX(-50%);
  z-index:100;
}
.btn-add{
  width:58px;height:58px;border-radius:var(--r-full);
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;font-size:28px;font-weight:400;
  cursor:pointer;
  box-shadow:var(--shadow-primary);
  transition:all var(--std) var(--ease-spring);
  display:flex;align-items:center;justify-content:center;
}
.btn-add:hover{transform:scale(1.08);box-shadow:0 6px 28px var(--primary-shadow-lg),0 0 0 7px var(--primary-ring)}


/* ===== ADD SHEET ===== */
.add-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--overlay-light);
  backdrop-filter:blur(2px);
  z-index:200;display:none;

.add-sheet .row{display:flex;gap:var(--s2)}

.btn{

}

.add-sheet-actions{display:flex;gap:var(--s2);margin-top:var(--s2)}
.add-sheet-actions .btn{width:auto;margin-top:0}
.add-sheet-actions .btn-primary{flex:1}
.add-sheet-actions .btn-ghost{flex:0 0 auto;padding:var(--s3) var(--s5);border-radius:var(--r-md)}
.add-sheet-actions-col{flex-direction:column}
.add-sheet-actions-col .btn{width:100%;margin-top:0}
.btn-primary-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);padding:var(--s3) var(--s5);border-radius:var(--r-md);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all var(--fast)}
.btn-primary-outline:active{transform:scale(.97)}
.settings-section{padding:var(--s3) 0}
.settings-label{font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:var(--s1)}
.settings-status{font-size:12px;color:var(--text-tertiary);margin-top:var(--s1)}

.settings-result.err{display:block;background:#ffebee;color:#c62828}
.settings-actions{display:flex;gap:var(--s2);margin-top:var(--s3)}
.settings-actions .btn{flex:1;margin-top:0}
.ai-loading{text-align:center;padding:var(--s4);font-size:14px;color:var(--text-secondary);font-weight:600}

@keyframes aiDot{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}
.ai-preview-name{font-size:18px;font-weight:800;color:var(--text);margin-bottom:var(--s3);text-align:center}
.ai-preview-row{display:flex;gap:var(--s2);padding:var(--s2) 0;border-bottom:1px solid var(--n100)}

.hdetail-actions{display:flex;flex-direction:column;align-items:center;gap:var(--s1);margin-top:var(--s3)}
.hdetail-del-link{font-size:12px;color:var(--text-tertiary);cursor:pointer;padding:var(--s2);transition:color var(--fast)}

/* ===== 今日报告 ===== */
.report-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:#faf8f5;overflow-y:auto;-webkit-overflow-scrolling:touch}

.r-top{text-align:center;padding:10px 0 12px}
.r-title{font-size:20px;font-weight:800;color:#1a1a18}

.r-card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 8px rgba(0,0,0,.05);margin-bottom:10px}

.r-mascot-img{width:140px;height:140px;object-fit:contain;transform:rotate(-5deg);filter:drop-shadow(0 6px 12px rgba(0,0,0,.12));position:relative;z-index:2}
.r-summary-right{flex:1;min-width:0;padding-top:12px}


.r-section-title{font-size:15px;font-weight:800;color:#1a1a18;margin-bottom:8px;margin-top:4px}

.r-summary-metrics{display:flex;gap:12px;margin-top:8px}
.r-sm{font-size:11px;color:#8a8680}

.r-rec-num{font-size:10px;color:#8a8680}

.r-rec-bar-fill{height:100%;background:linear-gradient(90deg,#58CC02,#46a302);border-radius:3px}
.r-badge{background:#e8f5e0;color:#58CC02;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;flex-shrink:0}

.r-ai-text{font-size:12px;color:#6d6964;line-height:1.5}
.r-footer{text-align:center;padding:8px 0;font-size:12px;font-weight:600;color:#58CC02}
/* ===== 里程碑弹窗 ===== */
.ms-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:900;background:var(--overlay);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.ms-sheet{background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:var(--s3) var(--s5) var(--s8);width:100%;max-width:480px;animation:slideUp .25s ease-out}
.ms-handle{width:36px;height:4px;border-radius:2px;background:var(--n200);margin:0 auto var(--s4)}
.ms-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:var(--s1)}
.ms-count{font-size:14px;color:var(--text-secondary);margin-bottom:var(--s4)}
.ms-list{display:flex;flex-direction:column;gap:var(--s2)}
.ms-row{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s3);border-radius:var(--r-md);background:var(--n50)}
.ms-header{background:transparent;font-size:12px;color:var(--text-tertiary);font-weight:600;padding-bottom:var(--s1)}
.ms-done{background:#e8f5e0}
.ms-label{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.ms-done .ms-label{color:var(--primary-dark)}
.ms-reward{font-size:13px;font-weight:700;color:var(--text-secondary);width:40px;text-align:right}
.ms-cul{font-size:13px;font-weight:700;color:var(--primary);width:40px;text-align:right}
.ms-done .ms-reward{color:var(--primary-dark)}
.ms-note{text-align:center;margin-top:var(--s4);font-size:12px;color:var(--text-tertiary)}
.r-report-tabs{display:flex;gap:4px;justify-content:center;margin-bottom:8px}
.r-tab{font-size:12px;font-weight:600;color:#8a8680;background:#fff;padding:4px 14px;border-radius:14px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.r-tab-active{color:#fff;background:var(--primary);box-shadow:0 2px 8px var(--primary-shadow)}
.del-confirm-modal{padding:var(--s8) var(--s6)}
.del-confirm-icon{display:block;text-align:center;margin-bottom:var(--s2)}
.del-confirm-btn{width:100%}

/* ===== LEVEL UP MODAL ===== */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--overlay);
  backdrop-filter:blur(4px);
  z-index:500;display:none;
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--surface);
  border-radius:var(--r-2xl);padding:var(--s10) var(--s6);
  max-width:340px;width:88%;
  text-align:center;
  animation:popIn .4s var(--ease-spring);
  box-shadow:var(--shadow-xl);
}
@keyframes popIn{
  from{transform:scale(.3) translateY(60px);opacity:0}
  to{transform:scale(1) translateY(0);opacity:1}
}
.modal .big{font-size:72px;display:block;margin-bottom:var(--s3)}
.modal h2{font-size:26px;margin-bottom:var(--s2);color:var(--text);font-weight:800}
.modal p{color:var(--text-tertiary);font-size:14px;margin-bottom:var(--s6)}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  color:#fff;
  width:100%;
  box-shadow:0 4px 20px rgba(255,150,0,.4);
}

/* ===== TOAST ===== */
.toast-container{
  position:fixed;top:var(--s4);left:50%;transform:translateX(-50%);
  z-index:400;display:flex;flex-direction:column;gap:var(--s1);
  pointer-events:none;align-items:center;
}
.toast{
  background:rgba(60,60,60,.92);
  color:#fff;padding:var(--s3) var(--s5);border-radius:14px;
  font-weight:700;font-size:14px;white-space:pre-line;text-align:left;
  animation:toastIn var(--fast) var(--ease-smooth),toastOut var(--fast) var(--ease-smooth) 2.2s forwards;
  pointer-events:auto;
  box-shadow:var(--shadow-md);
}
.toast.undo-toast{
  display:flex;align-items:center;gap:var(--s2);
  padding:var(--s3) var(--s4);cursor:default;
}
.toast.undo-toast .undo-btn{
  color:var(--primary);font-weight:800;background:none;
  border:none;cursor:pointer;font-size:13px;
  font-family:inherit;padding:0;white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* ===== CONFETTI ===== */
.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:500;overflow:hidden}
.confetti-piece{
  position:absolute;width:10px;height:10px;top:-12px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* ===== CARD ENTRANCE ANIMATION ===== */
@keyframes cardSlide{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== EMPTY STATE ===== */
.empty-state{
  text-align:center;padding:var(--s10) var(--s4);
  background:var(--surface);border-radius:var(--r-lg);
  box-shadow:var(--shadow-sm);
}
.empty-state .icon{margin-bottom:var(--s3)}
.empty-state p{font-size:14px;color:var(--text-tertiary);line-height:1.5}

/* ===== 习惯详情面板 ===== */
/* 7-day history bar */
.hweek-bar{display:flex;gap:4px;justify-content:center;padding:var(--s2) 0}
.hweek-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;

  background:transparent;
}
.hweek-item.hweek-active{
  background:var(--primary);box-shadow:0 2px 8px var(--primary-shadow);
}
.hweek-item.hweek-active .hweek-day{color:rgba(255,255,255,.7)}
.hweek-item.hweek-active .hweek-num{color:#fff}
.hweek-item.hweek-clickable{cursor:pointer}
.hweek-item.hweek-clickable:not(.hweek-active):hover{background:var(--n100)}
.hweek-day{font-size:10px;font-weight:600;color:var(--text-tertiary);line-height:1}
.hweek-num{font-size:18px;font-weight:800;color:var(--text);line-height:1.2;transition:transform var(--fast)}
.hweek-zero{color:var(--n250)}

/* Day detail panel */
.hday-detail{
  padding:var(--s2) 0 0;
  animation:fadeSlideIn .2s ease-out;
}
@keyframes fadeSlideIn{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}
.hday-detail-header{
  font-size:11px;font-weight:700;color:var(--text-tertiary);

  background:var(--n100);border-radius:var(--r-sm) var(--r-sm) 0 0;
}

  display:flex;align-items:center;gap:var(--s2);

  border-radius:var(--r-sm);
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.hday-rec-time{font-size:12px;color:var(--text-secondary);min-width:52px}
.hday-rec-label{

}
.hday-rec-del{

}
.hday-rec-del:hover{color:var(--red);background:rgba(255,75,75,.08)}
.hdetail-sheet{

}

.hdetail-del:hover{color:var(--red);background:rgba(255,75,75,.08)}
.hdetail-close{margin-left:auto;color:var(--n250);cursor:pointer;padding:var(--s1);border-radius:var(--r-full);transition:all var(--fast);display:flex;align-items:center}

.hdetail-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center}

.hdetail-title{font-size:20px;font-weight:800;color:var(--text)}

.hdetail-history{margin-bottom:var(--s2)}
.hweek-row{display:flex;gap:4px;justify-content:center;padding:var(--s2) 0}

.hdetail-count{font-size:13px;color:var(--text-secondary);margin-bottom:var(--s4);margin-left:4px}
.hdetail-section{

}
.hdetail-val{font-size:14px;font-weight:600;color:var(--text);line-height:1.5}
.hdetail-tip{color:var(--primary-dark);font-weight:600;line-height:1.7;font-size:13px}
.hdetail-prompt{font-size:15px;font-weight:700;color:var(--primary-dark)}
.hdetail-action{font-size:14px;font-weight:600;color:var(--text);line-height:1.5}

/* Todo detail title input */
.td-title-input{
  font-size:20px;font-weight:800;color:var(--text);
  background:transparent;border:none;outline:none;
  flex:1;min-width:0;font-family:inherit;
  border-bottom:2px solid transparent;
  transition:border-color var(--fast);
  padding:var(--s1) 0;
}

.td-session-row{

@media(max-width:400px){
  .task-card{padding:var(--s3)}
}

.icon-exp{color:var(--purple);width:16px;height:16px}

  <!-- ===== 合并卡片：进度 + 猴子 ===== -->
  <div class="merged-card">

    </div>

<script>
// ================================================================
// MINI-HABITS GAME ENGINE (保留原有核心逻辑)
// ================================================================

// --- 常量 ---
const MAX_LEVEL = 50;
const BEXP = 6, BGP = 1;
const MAX_TV = 21.27, MIN_TV = -47.27, DECAY = 0.9747, CLOSE = 0.00001;
const PMUL = { easy: 1, medium: 1.5, hard: 2 };
const STREAK_BONUS = 0.01;
const STREAK_MS = 7;

let _showDoneTodos = false;
const TITLES = [
  { l: 1, t: '萌芽新手' }, { l: 5, t: '坚持学徒' },
  { l: 10, t: '习惯小树' }, { l: 15, t: '一星达人' },
  { l: 21, t: '连击勇士' }, { l: 30, t: '二星达人' },
  { l: 42, t: '连击大师' }, { l: 50, t: '习惯之王' },
];



// --- 核心算法 ---
function clampV(v) { return Math.max(MIN_TV, Math.min(MAX_TV, v)); }
function calcDelta(v, d) { return DECAY ** clampV(v) * (d === 'down' ? -1 : 1); }
function calcRevDelta(v, d) {
  let c = clampV(v), t = c + DECAY ** c * (d === 'down' ? -1 : 1);
  while (true) { let x = t + DECAY ** t, d2 = c - x; if (Math.abs(d2) < CLOSE) break; t += d2 > 0 ? -d2 : d2; }
  return t - c;
}
function pmul(p) { return PMUL[p] ?? 1; }
function expToLv(l) { if (l < 5) return 25 * l; if (l === 5) return 150; return Math.round(((l ** 2) * 0.25 + 10 * l + 139.75) / 10) * 10; }
function getTitle(l) { let t = ''; for (const e of TITLES) { if (l >= e.l) t = e.t; else break; } return t; }
function streakMs(s) { return s > 0 && s % STREAK_MS === 0; }
function streakMul(s) { return 1 + s * STREAK_BONUS; }
function rd(v, d) { return Math.round(v * (10 ** d)) / (10 ** d); }
function gid() { return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }
function toDateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// --- 任务创建 ---
function taskDef(b) {
  const t = { _id: gid(), type: b.type || 'habit', text: b.text || '新任务', notes: '', value: b.value ?? 0, priority: b.priority || 'easy', createdAt: new Date() };
  if (t.type === 'habit') { t.up = true; t.down = true; t.counterUp = 0; t.counterDown = 0; t.history = []; }
  if (t.type === 'daily') { t.completed = false; t.streak = 0; t.frequency = 'weekly'; t.repeat = { m: true, t: true, w: true, th: true, f: true, s: true, su: true }; t.startDate = new Date(); t.history = []; }
  if (t.type === 'todo') { t.completed = false; t.dateCompleted = null; t.checklist = []; t.timeTracking = { sessions: [], runningSession: null }; }
  if (t.type === 'reward') { t.value = b.value ?? 20; }
  return t;
}

// --- 评分核心 ---
function scoreTask(user, task, dir = 'up', times = 1, cron = false) {
  const st = { exp: user.stats.exp, gp: user.stats.gp };
  if (task.type === 'reward' && task.value > user.stats.gp) throw Error('no_gp');
  const oldLvl = user._tmp?.leveledUp;
  user._tmp = {};
  if (oldLvl) user._tmp.leveledUp = oldLvl;

  if (task.type === 'habit') _sHabit(user, task, dir, times, cron, st);
  else if (task.type === 'daily') _sDaily(user, task, dir, times, cron, st);
  else if (task.type === 'todo') _sTodo(user, task, dir, times, cron, st);
  else if (task.type === 'reward') st.gp -= task.value;

  _upStats(user, st);
  user._tmp.delta = st.gp - (user._tmp._prevGp ?? user.stats.gp) + user.stats.gp;
}

function _chgVal(user, task, dir, times, cron) {
  let t = 0;
  for (let i = 0; i < times; i++) {
    const d = !cron && dir === 'down' ? calcRevDelta(task.value, dir) : calcDelta(task.value, dir);
    if (task.type !== 'reward') task.value += d;
    t += d;
  }
  return t;
}
function _addExp(st, task, delta, dir) {
  st.exp += Math.max(0, rd(delta * pmul(task.priority) * (dir === 'up' && task.streak ? streakMul(task.streak) : 1) * BEXP));
}
function _addGP(st, task, delta, dir) {
  st.gp += Math.max(0, rd(delta * pmul(task.priority) * (dir === 'up' && task.streak ? streakMul(task.streak) : 1) * BGP));
}
function _sHabit(u, t, dir, times, cron, st) {
  const d = _chgVal(u, t, dir, times, cron);
  if (d > 0) { _addExp(st, t, d, dir); _addGP(st, t, d, dir); }
  if (dir === 'up') t.counterUp = (t.counterUp || 0) + times; else t.counterDown = (t.counterDown || 0) + times;
  // 连击：每天至少做一次才计数
  if (dir === 'up' && times > 0) {
    const today = toDateStr(new Date());
    const last = t.history && t.history.length > 0 ? toDateStr(new Date(t.history[t.history.length - 1].date)) : null;
    if (last !== today) { t.streak = (t.streak || 0) + 1; }
    if (streakMs(t.streak)) u._tmp.streakMs = t.streak;
  }
  t.history = t.history || [];
  t.history.push({ date: Date.now(), value: t.value, scoredUp: dir === 'up' ? times : 0, scoredDown: dir === 'down' ? times : 0 });
}
function _sDaily(u, t, dir, times, cron, st) {
  if (cron) { _chgVal(u, t, dir, times, cron); t.streak = 0; t.completed = false; }
  else {
    const d = _chgVal(u, t, dir, times, cron);
    if (dir === 'up') {
      _addExp(st, t, d, dir); _addGP(st, t, d, dir);
      t.streak = (t.streak || 0) + 1; t.completed = true;
      t.history = t.history || []; t.history.push({ date: Date.now(), value: t.value, completed: true });
      if (streakMs(t.streak)) u._tmp.streakMs = t.streak;
    } else {
      t.streak = Math.max(0, (t.streak || 0) - 1); t.completed = false;
      if (t.history && t.history.length > 0) t.history.pop();
    }
  }
}
function _sTodo(u, t, dir, times, cron, st) {
  if (dir === 'up') {
    t.completed = true; t.dateCompleted = new Date();
    const d = _chgVal(u, t, dir, 1, cron); _addExp(st, t, d, dir); _addGP(st, t, d, dir);
  } else { t.completed = false; t.dateCompleted = null; _chgVal(u, t, dir, 1, cron); }
}
function _upStats(user, st) {
  user.stats.gp = Math.max(0, rd(st.gp)); user.stats.exp = Math.max(0, st.exp);
  let e = st.exp, en = expToLv(user.stats.lvl);
  if (e < en) return;
  const il = user.stats.lvl; let lv = false;
  while (e >= en) {
    e -= en;
    if (user.stats.lvl >= MAX_LEVEL) { user.stats.lvl = MAX_LEVEL; break; }
    user.stats.lvl += 1; lv = true;
    const nt = getTitle(user.stats.lvl);
    if (nt && user.stats.title !== nt) user.stats.title = nt;
    en = expToLv(user.stats.lvl);
  }
  user.stats.exp = rd(e);
  if (lv) {
    if (!user._tmp) user._tmp = {};
    if (!user._tmp.leveledUp) user._tmp.leveledUp = [];
    user._tmp.leveledUp.push({ il, nl: user.stats.lvl, title: user.stats.title });
  }
}

// ================================================================
// APP STATE
// ================================================================
const state = {
  user: { _id: 'hero', stats: { lvl: 1, exp: 0, gp: 0, title: '萌芽新手' }, _tmp: {} },
  tasks: [],
  tab: 'habits',
  todayDone: 0,

  streak: 0,
  dayCount: 1,
  hearts: 5,
  lastHeartsCheck: null,
  _todoDate: null,
  _lastMilestone: 0,
};

// --- 示例任务（四年级适用） ---
const SAMPLES = [
  // 习惯
  { type: 'habit', text: '跳绳 10 个' },
  { type: 'habit', text: '练字 3 个字' },

  { type: 'habit', text: '喝水一杯' },
  { type: 'habit', text: '做口算 3 道题' },
  { type: 'habit', text: '背 1-2 个英语单词' },
  { type: 'habit', text: '收拾书包（睡前）' },
  { type: 'habit', text: '读 2 页书' },
  { type: 'habit', text: '做一件家务' },
  { type: 'habit', text: '写一句话日记' },
  { type: 'habit', text: '引体向上 1 个' },
  { type: 'habit', text: '健腹轮 3 个' },
  { type: 'habit', text: '离开房间扔掉一个垃圾' },
  // 待办
  { type: 'todo', text: '语文作业' },
  { type: 'todo', text: '数学作业' },
  { type: 'todo', text: '英语作业' },
  { type: 'todo', text: '科学作业' },
  { type: 'todo', text: '整理房间' },
  { type: 'todo', text: '给家人做一张贺卡' },
  // 商店
  { type: 'reward', text: '多看 20 分钟动画', value: 20 },
  { type: 'reward', text: '选一个小零食', value: 15 },
  { type: 'reward', text: '周末去游乐场', value: 80 },
  { type: 'reward', text: '买一个新文具', value: 50 },
];

// ================================================================
// AUDIO (Web Audio API)
// ================================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = true;

function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playTone(freq, dur, type = 'sine', vol = 0.3) {
  if (!soundEnabled) return;
  try {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
// 多邻国风格音效
function playToneChain(notes, vol = 0.25) {
  notes.forEach(([freq, delay, dur, type]) => {
    setTimeout(() => playTone(freq, dur || 0.12, type || 'sine', vol), delay);
  });
}
function playTap() { playTone(880, 0.04, 'sine', 0.1); }                           // 按钮轻触
function playPop() { playTone(660, 0.06, 'sine', 0.12); }                          // 弹窗打开
function playTask() { playToneChain([[523,0,0.08],[659,60,0.08],[784,120,0.14]], 0.2); }  // 完成任务 ding

function saveState() {
  localStorage.setItem('mh_user', JSON.stringify(state.user));
  localStorage.setItem('mh_tasks', JSON.stringify(state.tasks));
  localStorage.setItem('mh_meta', JSON.stringify({
    todayDone: state.todayDone,
    streak: state.streak,
    dayCount: state.dayCount,
    hearts: state.hearts,
    lastHeartsCheck: state.lastHeartsCheck,
    _todoDate: state._todoDate,
    _lastMilestone: state._lastMilestone,
    soundEnabled: soundEnabled,
  }));
  syncPush();
}
function loadState() {
  try {
    const u = localStorage.getItem('mh_user');
    const t = localStorage.getItem('mh_tasks');
    const m = localStorage.getItem('mh_meta');
    if (u) state.user = JSON.parse(u);
    if (t) {
      state.tasks = JSON.parse(t);
      // 迁移：将旧的每日类型转为习惯
      state.tasks.forEach(task => { if (task.type === 'daily') task.type = 'habit'; });
      // 迁移：为旧 todo 补充 timeTracking 字段
      state.tasks.forEach(task => {
        if (task.type === 'todo' && !task.timeTracking) {
          task.timeTracking = { sessions: [], runningSession: null };
        }
      });
    }
    if (m) {
      const meta = JSON.parse(m);
      state.todayDone = meta.todayDone ?? 0;
      state.streak = meta.streak ?? 0;
      state.dayCount = meta.dayCount ?? 1;
      state.hearts = meta.hearts ?? 5;
      state.lastHeartsCheck = meta.lastHeartsCheck ?? null;
      state._todoDate = meta._todoDate ?? null;
      state._lastMilestone = meta._lastMilestone ?? 0;
      soundEnabled = meta.soundEnabled ?? true;
    }
  } catch (e) { console.warn('load failed', e); }
}

// ================================================================
// SYNC — 跨设备同步
// ================================================================
function syncBaseUrl() {
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    return 'http://localhost:3456';
  return '';
}

let _syncInterval = null;
function startSyncPolling() {
  if (_syncInterval) return;
  _syncInterval = setInterval(() => syncPull(), 8000);
}
function stopSyncPolling() {
  if (_syncInterval) { clearInterval(_syncInterval); _syncInterval = null; }
}

async function syncPush() {
  const pid = localStorage.getItem('mh_player_id');
  const tok = localStorage.getItem('mh_device_token');
  if (!pid || !tok) return;
  // 数据没变就不推（避免 merge 触发的 saveState 造成循环推送）
  const prevSnapshot = localStorage.getItem('mh_snapshot') || '';
  const curSnapshot = JSON.stringify({
    tl: state.tasks.length,
    lv: state.user.stats.lvl,
    ex: state.user.stats.exp,
    gp: Math.floor(state.user.stats.gp),
    td: state.todayDone,
    st: state.streak,
    ts: state.tasks.map(t => t.counterUp + '|' + (t.counterDown || 0) + '|' + (t.completed ? 1 : 0)),
  });
  if (curSnapshot === prevSnapshot) return;
  localStorage.setItem('mh_snapshot', curSnapshot);
  try {
    const data = {
      user: state.user,
      tasks: state.tasks,
      meta: {
        todayDone: state.todayDone,
        streak: state.streak,
        dayCount: state.dayCount,
        hearts: state.hearts,
        lastHeartsCheck: state.lastHeartsCheck,
        _todoDate: state._todoDate,
        _lastMilestone: state._lastMilestone,
        soundEnabled: soundEnabled,
      },
    };
    const r = await fetch(syncBaseUrl() + '/api/sync/push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ playerId: pid, deviceToken: tok, data }),
    });
    if (!r.ok) return;
    const j = await r.json();
    if (j.ok) {
      localStorage.setItem('mh_last_sync', String(j.updatedAt));
    }
    // 推送后启动轮询拉取
    startSyncPolling();
  } catch (e) {}
}

async function syncPull() {
  const pid = localStorage.getItem('mh_player_id');
  if (!pid) return;
  try {
    const r = await fetch(syncBaseUrl() + '/api/sync/pull?playerId=' + encodeURIComponent(pid));
    if (!r.ok) return;
    const j = await r.json();
    if (!j.data) return;
    // 存上次 pull 的时间戳，避免重复拉同样的数据
    const lastPull = parseInt(localStorage.getItem('mh_last_pull')) || 0;
    if (j.updatedAt <= lastPull) return;
    // 全量替换（删除、新增、修改都同步过来）
    if (j.data.user) state.user = JSON.parse(JSON.stringify(j.data.user));
    if (j.data.tasks) state.tasks = JSON.parse(JSON.stringify(j.data.tasks));
    if (j.data.meta) {
      const m = j.data.meta;
      state.todayDone = m.todayDone ?? state.todayDone;
      state.streak = m.streak ?? state.streak;
      state.dayCount = m.dayCount ?? state.dayCount;
      state.hearts = m.hearts ?? state.hearts;
      state.lastHeartsCheck = m.lastHeartsCheck ?? state.lastHeartsCheck;
      state._todoDate = m._todoDate ?? state._todoDate;
      state._lastMilestone = m._lastMilestone ?? state._lastMilestone;
      soundEnabled = m.soundEnabled ?? soundEnabled;
    }
    saveState();
    render();
    localStorage.setItem('mh_last_pull', String(j.updatedAt));
  } catch (e) {}
}

function clearAppCache() {
  if ('caches' in window) {
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))));
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs =>
      Promise.all(regs.map(r => r.unregister()))
    );
  }
  localStorage.removeItem('mh_ver');
  showToast('已清除缓存，即将刷新...');
  setTimeout(() => location.reload(), 500);
}

function syncDisconnect() {
  stopSyncPolling();
  localStorage.removeItem('mh_player_id');
  localStorage.removeItem('mh_device_token');
  localStorage.removeItem('mh_family_code');
  localStorage.removeItem('mh_last_sync');
  localStorage.removeItem('mh_last_pull');

  try {
    const r = await fetch(syncBaseUrl() + '/api/sync/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ familyCode: code }),
    });
    if (!r.ok) { showToast('❌ 家庭码无效'); return; }
    const j = await r.json();
    localStorage.setItem('mh_player_id', j.playerId);
    localStorage.setItem('mh_device_token', j.deviceToken);
    localStorage.setItem('mh_family_code', code);
    await syncPush();
    await syncPull();
    document.getElementById('syncSection').innerHTML = syncRenderPaired();
    showToast(j.isNew ? '✅ 家庭码已设置，其他设备输入同一码即可同步' : '✅ 同步成功！');

function updateMergedDate() {
  const el = document.getElementById('mergedDate');
  if (el) {
    const now = new Date();
    const days = ['日','一','二','三','四','五','六'];
    el.textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
  }
}
function renderMergedStats() {
  const today = toDateStr(new Date());
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - (now.getDay() || 7) + 1);
  const weekStartStr = toDateStr(weekStart);
  let todayCount = 0, weekCount = 0, totalCount = 0, _prevMilestone = 0;
  const MILESTONES = [5, 10, 15, 20, 30, 50];
  state.tasks.forEach(t => {
    (t.history || []).forEach(h => {
      const c = h.scoredUp || 0;
      const ds = toDateStr(new Date(h.date));
      if (ds === today) todayCount += c;
      if (ds >= weekStartStr) weekCount += c;
      totalCount += c;
    });
  });
  // 找下一个里程碑
  let nextTarget = MILESTONES.find(m => m > todayCount) || MILESTONES[MILESTONES.length - 1];
  let prevMilestone = 0;
  for (const m of MILESTONES) { if (m <= todayCount) prevMilestone = m; }
  const progress = nextTarget > 0 ? ((todayCount - prevMilestone) / (nextTarget - prevMilestone)) * 100 : 0;
  // 里程碑奖励
  const MILESTONE_BONUS = { 5: 5, 10: 6, 15: 7, 20: 8, 30: 18, 50: 40 };
  if (MILESTONE_BONUS[todayCount] && state._lastMilestone !== todayCount) {
    state._lastMilestone = todayCount;
    state.user.stats.gp += MILESTONE_BONUS[todayCount];
    showToast(`里程碑达成！+${MILESTONE_BONUS[todayCount]} 金币`);
    confetti();
    playStreak();
    saveState();
  }
  if (state._lastMilestone && !MILESTONE_BONUS[todayCount]) state._lastMilestone = 0;
  document.getElementById('dailyProgressFill').style.width = Math.min(100, progress) + '%';
  document.getElementById('dailyProgressCount').textContent = todayCount;
  document.getElementById('dailyProgressTarget').textContent = nextTarget;
  const bn = MILESTONE_BONUS[nextTarget] || nextTarget * 2;
  document.getElementById('dailyProgressNext').textContent = `${nextTarget}次 → +${bn} 金币`;
  document.getElementById('statToday').textContent = '今日 ' + todayCount;
  document.getElementById('statWeek').textContent = '本周 ' + weekCount;
  document.getElementById('statTotal').textContent = '累计 ' + totalCount;
}

function renderTasks() {
  const tab = state.tab;
  const map = { habits: 'habitsList', todos: 'todosList', history: 'historyListTab', rewards: 'rewardsList' };
  for (const [k, id] of Object.entries(map)) {
    const el = document.getElementById(id);
    const tasks = state.tasks.filter(t => {
      if (k === 'habits') return t.type === 'habit' || t.type === 'daily';
      if (k === 'todos') return t.type === 'todo';
      if (k === 'history') return false; /* 记录 tab 不走常规渲染 */
      if (k === 'rewards') return t.type === 'reward';
      return false;
    });
    if (k === 'history') continue; /* 记录 tab 由 showHistory() 单独渲染 */
    if (tasks.length === 0) {
      const emptyIcons = { habits: 'refresh-cw', dailies: 'calendar', todos: 'clipboard-list', rewards: 'gift' };
      el.innerHTML = `<div class="empty-state"><div class="icon"><i data-lucide="${emptyIcons[k] || 'sparkles'}" class="icon-empty"></i></div><p>还没有任务，点 + 添加吧！</p></div>`;
    } else {
      // 习惯：按今日完成次数从高到低排序
      if (k === 'habits') {
        const today = toDateStr(new Date());
        tasks.sort((a, b) => {
          const ac = (a.history || []).filter(h => toDateStr(new Date(h.date)) === today).reduce((s, h) => s + (h.scoredUp || 0), 0);
          const bc = (b.history || []).filter(h => toDateStr(new Date(h.date)) === today).reduce((s, h) => s + (h.scoredUp || 0), 0);
          return bc - ac;
        });
      }
      // 待办：已完成排到底部
      if (k === 'todos') tasks.sort((a, b) => (a.completed ? 1 : 0) - (b.completed ? 1 : 0));
      el.innerHTML = tasks.map(t => cardHTML(t, k === 'rewards')).join('');
    }
    // 待办：已完成自动隐藏，底部可展开
    if (k === 'todos') { updateTodoFooter(); }
  }
  if(typeof lucide!=="undefined"&&lucide.createIcons)lucide.createIcons();
}

  let prompt, times, action, next;
  if (isExercise) { times='每天 1 次'; prompt='换好运动装备／站起来活动时'; action='先做 3 个，做完就算成功'; next='逐渐增加数量'; }

  else { times='每天 1-2 次'; prompt='做完固定事后（如刷牙后／回家后）'; action='先做 2 分钟，做完就算成功'; next='坚持一周后增加时长'; }
  return { times, prompt, action, next };
}

function importDataFromClipboard() {

    if (timedOut) return;

  });
}

function restoreFromText(text) {
  try {
    const data = JSON.parse(text);
    if (!data.user || !data.tasks) {
      showToast('❌ 数据格式不对');
      return;
    }
    // 合并 tasks：按 _id 去重，同名同类型也去重
    const existMap = {};
    const nameMap = {};
    state.tasks.forEach(t => {
      existMap[t._id] = t;
      nameMap[t.type + '|' + t.text] = t;
    });
    let added = 0, merged = 0;
    data.tasks.forEach(t => {
      let local = existMap[t._id];
      if (!local) local = nameMap[t.type + '|' + t.text]; // 同名同类型也视为同一个
      if (local) {
        // 已存在 → 合并 history 和 sessions（补充缺失的记录）
        if (t.history && local.history) {
          const localDates = new Set(local.history.map(h => h.date));
          t.history.forEach(h => { if (!localDates.has(h.date)) { local.history.push(h); merged++; } });
        }
        if (t.timeTracking?.sessions && local.timeTracking?.sessions) {
          const localStarts = new Set(local.timeTracking.sessions.map(s => s.start));
          t.timeTracking.sessions.forEach(s => { if (!localStarts.has(s.start)) { local.timeTracking.sessions.push(s); merged++; } });
        }
      } else {
        state.tasks.push(t);
        added++;
      }
    });
    // 合并 user stats（取较大的值）
    if (data.user?.stats) {
      if (data.user.stats.gp > (state.user.stats.gp || 0)) state.user.stats.gp = data.user.stats.gp;
      if (data.user.stats.exp > (state.user.stats.exp || 0)) state.user.stats.exp = data.user.stats.exp;
      if (data.user.stats.lvl > state.user.stats.lvl) state.user.stats.lvl = data.user.stats.lvl;
    }
    // 合并 meta
    if (data.meta) {
      if (data.meta.todayDone > state.todayDone) state.todayDone = data.meta.todayDone;
      if (data.meta.streak > state.streak) state.streak = data.meta.streak;
      if (data.meta.dayCount > state.dayCount) state.dayCount = data.meta.dayCount;
      if (data.meta.hearts > state.hearts) state.hearts = data.meta.hearts;
    }
    saveState();
    render();
    const habits = state.tasks.filter(t => t.type === 'habit').length;
    const todos = state.tasks.filter(t => t.type === 'todo').length;
    const records = state.tasks.reduce((s, t) => s + (t.history?.length || 0) + (t.timeTracking?.sessions?.length || 0), 0);
    const detail = `${habits}个习惯 ${todos}个待办 ${records}条记录`;
    const msg = added > 0 ? `✅ 新增 ${added} 个任务` : '✅ 没有新任务需要添加';
    showToast(merged > 0 ? `${msg}，合并了 ${merged} 条记录，${detail}` : `${msg}，${detail}`);
  } catch (err) {
    showToast('❌ 恢复失败：' + err.message);
  }
}

function showDayRecords(taskId, dateStr) {
  const task = state.tasks.find(t => t._id === taskId);
  if (!task) return;
  const detailId = `hDayDetail-${taskId.replace(/[^a-zA-Z0-9]/g,'')}`;
  const el = document.getElementById(detailId);
  if (!el) return;

  // 切换高亮
  if (_activeDayDetail === dateStr && el.innerHTML) {
    el.innerHTML = '';
    _activeDayDetail = null;
    // 取消高亮
    document.querySelectorAll('#habitDetail .hweek-item.hweek-active').forEach(e => e.classList.remove('hweek-active'));
    // 恢复今天高亮
    const items = document.querySelectorAll('#habitDetail .hweek-item');
    items[6]?.classList.add('hweek-active'); // last item = today
    return;
  }
  _activeDayDetail = dateStr;
  // 高亮选中日
  const items = document.querySelectorAll('#habitDetail .hweek-item');
  items.forEach(e => e.classList.remove('hweek-active'));
  const todayStr = toDateStr(new Date());
  const dayIndex = 6 - Math.round((new Date(todayStr) - new Date(dateStr)) / 86400000);
  if (dayIndex >= 0 && dayIndex < 7) items[dayIndex]?.classList.add('hweek-active');

  const records = (task.history || []).filter(h => toDateStr(new Date(h.date)) === dateStr && (h.scoredUp || 0) > 0);
  if (!records.length) { el.innerHTML = '<span style="font-size:12px;color:var(--text-tertiary);padding:var(--s2)">暂无记录</span>'; return; }
  const todayLabel = toDateStr(new Date());
  const dateLabel = dateStr === todayLabel ? '今天' : dateStr;
  el.innerHTML = `<div class="hday-detail-header">${dateLabel}</div>
    ${records.map((h, idx) => {
      const time = new Date(h.date).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      return `<div class="hday-record">
        <span class="hday-rec-time">${time}</span>

  const timeHtml = task.dateCompleted ? `<span class="todo-time">${fmtTime(task.dateCompleted)} 完成</span>` : '';

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const today = toDateStr(now);
  const taskDay = toDateStr(d);
  if (taskDay === today) return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const yesterday = toDateStr(new Date(now - 86400000));
  if (taskDay === yesterday) return `昨天 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function switchTab(tab) {

  state.tab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  ['habitsList', 'todosList', 'historyListTab', 'rewardsList'].forEach(id => document.getElementById(id).classList.toggle('hidden', id.replace('List', '') !== tab));

function clickTask(id) {
  const task = state.tasks.find(t => t._id === id);
  if (!task) return;

  if (task.type === 'reward') {
    try {
      const before = state.user.stats.gp;
      scoreTask(state.user, task, 'up');
      render();
      spawnFloat(task, 'gp', before);
      showToast(`已兑换「${task.text}」！`);
    } catch (e) {
      showToast(`金币不够，多做任务攒钱吧！`);
      playNoGP();
    }
    return;
  }

  if (task.type === 'todo') {
    const wasComplete = task.completed;
    if (wasComplete) {
      scoreTask(state.user, task, 'down');
    } else {
      // 如果正在计时，先停止
      if (task.timeTracking?.runningSession) stopTaskTimer(task._id, true);
      _doComplete(task);
    }
    // 只更新当前卡片，不重新渲染整个列表
    document.querySelectorAll(`.task-card[data-id="${id}"]`).forEach(card => {
      card.classList.toggle('completed', !!task.completed);
      card.querySelector('.task-check').textContent = task.completed ? '✓' : '';
      card.style.display = task.completed && !_showDoneTodos ? 'none' : '';
    });
    // 刷新计时区域
    updateTimerCard(task);
    document.getElementById('statGp').textContent = Math.floor(state.user.stats.gp);
    renderMergedStats();
    updateTodoFooter();
    saveState();
    checkUp();
    return;
  }
  if (task.type === 'habit') { clickHabit(task._id, 'up'); return; }
  if (task.type === 'daily') { if (task.completed) { scoreTask(state.user, task, 'down'); render(); } else { _doComplete(task); } render(); checkUp(); return; }

}

function clickHabit(id, dir) {
  const task = state.tasks.find(t => t._id === id);
  if (!task) return;
  if (state.hearts <= 0) { showToast('爱心耗尽！先恢复再说吧'); return; }
  const beforeGP = state.user.stats.gp;
  const beforeExp = state.user.stats.exp;
  scoreTask(state.user, task, dir);
  if (dir === 'up') {

function startTaskTimer(id) {
  const task = state.tasks.find(t => t._id === id);
  if (!task || task.completed || task.timeTracking?.runningSession) return;
  if (!task.timeTracking) task.timeTracking = { sessions: [], runningSession: null };

  task.timeTracking.runningSession = now;
  task.timeTracking.sessions.push({ start: now, end: null });

function hideFocusOverlay() {

let _pendingTimerConfirm = null;

function confirmTimerDone() {
  document.getElementById('timerConfirmOverlay').classList.remove('show');
  playTap();

  _pendingTimerConfirm = null;
  if (fn) fn(true);

function cancelTimerDone() {

function stopTaskTimer(id, silent) {
  const task = state.tasks.find(t => t._id === id);
  if (!task || !task.timeTracking?.runningSession) return;
  const now = new Date();
  const session = task.timeTracking.sessions.find(s => !s.end);
  if (session) session.end = now;
  task.timeTracking.runningSession = null;

  if (!silent) {
    // 异步弹窗询问，不阻塞
    _pendingTimerConfirm = (completed) => {
      _finishStopTimer(task, session, now, completed);
    };
    document.getElementById('timerConfirmTitle').textContent = `「${task.text}」做完了吗？`;
    if (session) {
      const elapsed = now - new Date(session.start);
      document.getElementById('timerConfirmDesc').textContent = `专注了 ${formatElapsed(elapsed)}，做完了吗？`;
    } else {
      document.getElementById('timerConfirmDesc').textContent = '做完了吗？';
    }
    document.getElementById('timerConfirmOverlay').classList.add('show');
    return; // 等待弹窗回调
  }

  // 静默停止（完成时自动触发）
  _finishStopTimer(task, session, now, false);
}

function _finishStopTimer(task, session, now, completed) {
  hideFocusOverlay();

  if (completed) {
    if (state.hearts <= 0) {
      showToast('爱心耗尽！先恢复再说吧');
      task.timeTracking.runningSession = now; // 恢复计时
      if (session) session.end = null;
      updateTimerCard(task);
      saveState();
      return;
    }
    _doComplete(task);
  }

  // 同步统计数据
  document.getElementById('statGp').textContent = Math.floor(state.user.stats.gp);
  renderMergedStats();
  updateTodoFooter();
  checkUp();

  updateTimerCard(task);
  saveState();
  if (session) {
    const elapsed = now - new Date(session.start);
    const minutes = Math.floor(elapsed / 60000);
    const seconds = Math.floor((elapsed % 60000) / 1000);
    const timeStr = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
    showToast(completed
      ? `✅ ${task.text} — 专注 ${timeStr}，任务完成！`
      : `⏹ ${task.text} — 专注 ${timeStr}`);
  }
}

function updateTimerCard(task) {
  const cards = document.querySelectorAll(`.task-card[data-id="${task._id}"]`);
  if (!cards.length) return;
  const html = timerHTML(task);
  cards.forEach(card => {
    const old = card.querySelector('.task-timer');
    if (old) {
      if (html) old.outerHTML = html;
      else old.remove();
    } else if (html) {
      card.insertAdjacentHTML('beforeend', html);
    }
    card.classList.toggle('running', !task.completed && !!task.timeTracking?.runningSession);
    // 同步完成状态：class + 勾选 + 隐藏
    card.classList.toggle('completed', !!task.completed);
    const check = card.querySelector('.task-check');
    if (check) check.textContent = task.completed ? '✓' : '';
    if (task.completed && !_showDoneTodos) {
      card.style.display = 'none';
    } else {
      card.style.display = '';
    }
  });
  if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
}

function getTodayTotal(task) {
  const tt = task.timeTracking;
  if (!tt || !tt.sessions || !tt.sessions.length) return 0;
  const today = toDateStr(new Date());
  let total = 0;
  for (const s of tt.sessions) {
    if (toDateStr(new Date(s.start)) !== today) continue;
    const end = s.end ? new Date(s.end) : new Date();
    total += end - new Date(s.start);
  }
  return total;
}

function formatElapsed(ms) {
  const totalSec = Math.floor(Math.max(0, ms) / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}
function formatDurationShort(ms) {
  const totalSec = Math.floor(Math.max(0, ms) / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  if (m >= 60) {
    const h = Math.floor(m / 60);
    return `${h}小时${m % 60}分`;
  }
  if (m > 0) return `${m}分${s}秒`;
  return `${s}秒`;
}

function ensureTimerTick() {
  if (_timerInterval) return;
  _timerInterval = setInterval(() => {
    const runningTasks = state.tasks.filter(t =>
      t.type === 'todo' && !t.completed && t.timeTracking?.runningSession
    );
    if (!runningTasks.length) {
      clearInterval(_timerInterval);
      _timerInterval = null;
      return;
    }
    runningTasks.forEach(task => {
      const elapsed = formatElapsed(Date.now() - new Date(task.timeTracking.runningSession).getTime());
      const el = document.getElementById('timer-' + task._id);
      if (el) el.textContent = elapsed;
      const focusEl = document.getElementById('focusTimer');
      if (focusEl) focusEl.textContent = elapsed;
    });
  }, 1000);
}

// ===== COMPLETE =====
function _doComplete(task) {
  const beforeGP = state.user.stats.gp;
  const beforeExp = state.user.stats.exp;
  if (state.hearts <= 0) { showToast('爱心耗尽！先恢复再说吧'); return; }
  scoreTask(state.user, task, 'up');
  state.todayDone++;
  const gpGain = rd(state.user.stats.gp - beforeGP);
  const expGain = rd(state.user.stats.exp - beforeExp);
  if (expGain > 0) spawnFloat(task, 'exp', beforeExp);
  if (gpGain > 0) spawnFloat(task, 'gp', beforeGP);
  monkeyHappy(task); // 完成任务猴子开心
  playTask();
  // Streak tracking
  if (task.type === 'daily') {
    const today = toDateStr(new Date());
    const yesterday = toDateStr(new Date(Date.now() - 86400000));
    if (state.lastHeartsCheck === yesterday || state.lastHeartsCheck === null) {
      state.streak++;
    } else if (state.lastHeartsCheck !== today) {
      state.streak = 1;
    }
    state.lastHeartsCheck = today;
    state.dayCount++;
    if (streakMs(state.streak)) {
      playStreak();
      showModal('flame', `连续 ${state.streak} 天！`, `超级奖励！+50 金币 +1 爱心 +50经验`, '太厉害了！');
      state.user.stats.gp += 50;
      gainHeart();
      state.user.stats.exp += 50;
      render();
    }
    _checkHeartsPenalty();
  }
}

function _checkHeartsPenalty() {
  const today = toDateStr(new Date());
  if (state.lastHeartsCheck === today) return;
  const dailies = state.tasks.filter(t => t.type === 'daily');
  const allDone = dailies.every(t => t.completed);
  if (!allDone && state.lastHeartsCheck !== null) {
    const yesterday = toDateStr(new Date(Date.now() - 86400000));
    if (state.lastHeartsCheck !== today) {
      if (loseHeart()) {
        showToast('昨日有未完成的每日任务，扣了1颗爱心');
      }
    }
  }
}

function spawnFloat(task, type, before) {
  const cards = document.querySelectorAll(`.task-card[data-id="${task._id}"]`);
  if (cards.length === 0) return;
  const card = cards[0];
  const el = document.createElement('div');
  el.className = `float-score ${type}`;
  const val = type === 'exp' ? rd(state.user.stats.exp - before) : rd(state.user.stats.gp - before);
  el.textContent = type === 'exp' ? `+${val}⭐` : `+${val}🪙`;
  card.querySelector('.task-body')?.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

let _deletedTask = null;
let _deleteTimer = null;
function deleteTask(id) {

function showHistory() {
  const list = document.getElementById('historyListTab');
  list.classList.remove('hidden');
  const today = toDateStr(new Date());
  const yesterday = toDateStr(new Date(Date.now() - 86400000));
  let html = '';
  let hasData = false;

  // 收集所有完成记录
  const records = [];
  state.tasks.forEach(task => {
    const icon = getTaskIcon(task.text);
    // 习惯/每日的历史
    (task.history || []).forEach(h => {
      const date = toDateStr(new Date(h.date));
      const time = fmtTime(h.date);
      const count = h.scoredUp || 0;
      if (count > 0) {
        hasData = true;
        records.push({ date, time, text: task.text, id: task._id + '_' + h.date, taskId: task._id, ts: h.date, label: count + ' 次', icon, category: 'habit' });
      }
    });
    // 待办完成
    if (task.type === 'todo' && task.completed && task.dateCompleted) {
      hasData = true;
      records.push({ date: toDateStr(new Date(task.dateCompleted)), time: fmtTime(task.dateCompleted), text: task.text, id: task._id + '_todo', taskId: task._id, ts: new Date(task.dateCompleted).getTime(), label: '✓ 完成', icon, category: 'todo' });
    }
    // 待办计时记录
    if (task.type === 'todo' && task.timeTracking?.sessions) {
      task.timeTracking.sessions.forEach((s, idx) => {
        if (!s.end) return; // 只显示已结束的 session
        const start = new Date(s.start);
        const end = new Date(s.end);
        const dur = end - start;
        if (dur < 1000) return; // 太短的忽略
        hasData = true;
        records.push({
          date: toDateStr(start),
          time: fmtTime(s.start),
          text: task.text,
          id: task._id + '_timer_' + start.getTime(),
          taskId: task._id,
          ts: start.getTime(),
          label: '专注 ' + formatDurationShort(dur),
          icon,
          category: 'todo',
        });
      });
    }
    // 奖励购买
    if (task.type === 'reward' && task.completed && task.dateCompleted) {
      hasData = true;
      records.push({ date: toDateStr(new Date(task.dateCompleted)), time: fmtTime(task.dateCompleted), text: task.text, id: task._id + '_reward', taskId: task._id, ts: new Date(task.dateCompleted).getTime(), label: '已购买', icon: 'gift', category: 'reward' });
    }
  });

  if (!hasData) {
    list.innerHTML = '<div style="text-align:center;padding:var(--s8);color:var(--text-tertiary);font-size:14px">还没有完成记录<br><span style="font-size:12px">完成习惯后就会显示在这里</span></div>';
    return;
  }

  // 按日期分组，从新到旧
  records.sort((a, b) => b.ts - a.ts);
  const groups = {};
  records.forEach(r => {
    if (!groups[r.date]) groups[r.date] = [];
    groups[r.date].push(r);
  });

  Object.keys(groups).sort().reverse().forEach(date => {
    const label = date === today ? '今天' : date === yesterday ? '昨天' : date;
    html += `<div class="history-date-label">${label}</div>`;
    groups[date].forEach(r => {
      const rIcon = r.icon || 'sparkles';
      html += `<div class="task-card history-item" data-id="${r.id}" data-taskid="${r.taskId}" data-ts="${r.ts}">
        <span class="history-icon"><i data-lucide="${rIcon}" style="width:24px;height:24px"></i></span>
        <div class="history-body">
          <span class="history-text">${esc(r.text)}</span>
          <span class="history-time">${new Date(r.ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
        </div>
        <span class="history-label">${r.label}</span>
        <span class="history-del" onclick="event.stopPropagation();deleteHistoryRecord('${r.id}','${r.taskId}',${r.ts})">×</span>
      </div>`;
    });
  });

  list.innerHTML = html;
  if(typeof lucide!=="undefined"&&lucide.createIcons)lucide.createIcons();
}
let _pendingHistoryDelete = null;
let _pendingDayRecordDelete = null;
function deleteHistoryRecord(recId, taskId, ts) {
  _pendingHistoryDelete = { recId, taskId, ts };
  document.getElementById('delConfirmTitle').textContent = '删除这条记录？';
  document.getElementById('delConfirmDesc').textContent = '这条记录将被删除，无法恢复';
  document.getElementById('delConfirmOverlay').classList.add('show');
}
function confirmHistoryDelete() {
  if (!_pendingHistoryDelete) return;
  const { recId, taskId, ts } = _pendingHistoryDelete;
  _pendingHistoryDelete = null;
  document.getElementById('delConfirmOverlay').classList.remove('show');
  const task = state.tasks.find(t => t._id === taskId);
  if (!task) return;

  // 计时记录删除：移除对应的 session
  if (recId && recId.includes('_timer_')) {
    const startTs = parseInt(recId.split('_timer_')[1], 10);
    if (task.timeTracking?.sessions) {
      task.timeTracking.sessions = task.timeTracking.sessions.filter(s => {
        const sStart = new Date(s.start).getTime();
        return sStart !== startTs;
      });
    }
    saveState();
    showHistory();
    showToast('已删除');
    return;
  }

  if (task.history) {
    task.history = task.history.filter(h => h.date !== ts);
  }
  if (task.type === 'todo' || task.type === 'reward') {
    task.completed = false;
    task.dateCompleted = null;
  }
  saveState();
  // 更新习惯卡片上的计数
  document.querySelectorAll(`.task-card[data-id="${taskId}"] .habit-count`).forEach(el => {
    const today = toDateStr(new Date());
    const c = (task.history || []).filter(h => toDateStr(new Date(h.date)) === today).reduce((s, h) => s + (h.scoredUp || 0), 0);
    el.textContent = `今天 ×${c || 0}`;
    el.classList.toggle('habit-count-empty', !c);
  });
  showHistory(); // 刷新记录列表
  showToast('已删除');
}

document.getElementById('timerConfirmOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) cancelTimerDone();
});

// ===== INIT =====
loadState();
// 每日重置待办
const todayStr = toDateStr(new Date());
if (state._todoDate !== todayStr) {
  state.tasks.filter(t => t.type === 'todo').forEach(t => {
    // 如果跨天时有正在计时的 session，关闭它
    if (t.timeTracking?.runningSession) {
      const session = t.timeTracking.sessions.find(s => !s.end);
      if (session) session.end = new Date(new Date(t.timeTracking.runningSession).setHours(23,59,59,999));
      t.timeTracking.runningSession = null;
    }
    t.completed = false; t.dateCompleted = null;
  });
  state._todoDate = todayStr;
}
// 首次使用：加载示例任务
if (state.tasks.length === 0) {
  SAMPLES.forEach(t => state.tasks.push(taskDef(t)));
} else {
  // 迁移：移除旧名称的重复习惯（已被改名）
  const oldNames = ['背 5 个英语单词','跳绳 50 个','练字 5 分钟','做口算一页','阅读 15 分钟'];
  state.tasks = state.tasks.filter(t => !oldNames.includes(t.text));
  // 注意：不再自动补充被删除的示例任务
  // 用户删除=不想要，刷新后不该再出现
}
soundEnabled = localStorage.getItem('mh_sound') !== 'off';
_monkeyIdx = Math.floor(Math.random() * MONKEY_LIST.length);
document.getElementById('monkeyMascot').src = MONKEY_LIST[_monkeyIdx];

saveState();
render();
if(typeof lucide!=="undefined"&&lucide.createIcons)lucide.createIcons();
// 启动计时器（如果有正在计时的任务）
const hasRunning = state.tasks.some(t => t.type === 'todo' && !t.completed && t.timeTracking?.runningSession);
if (hasRunning) ensureTimerTick();
saveState();
// 启动时后台拉取同步数据并开始轮询
if (localStorage.getItem('mh_player_id')) {
  setTimeout(() => { syncPull(); startSyncPolling(); }, 1000);
}

// Service Worker 自动更新检测（解决 PWA 缓存旧代码的问题）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    // 新 SW 接管了，刷新页面加载新版本
    window.location.reload();
  });
  // 检查是否有等待中的新 SW
  navigator.serviceWorker.ready.then(reg => {
    if (reg.waiting) {
      // 有等待中的新 SW → 让它立即接管
      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
  });
}

// 注册 Service Worker（PWA）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').then(() => {
    console.log('SW 已注册');
  }).catch(() => {});
}

console.log('朱古力豆 · Lucide 图标系统');

// ===== URL 路由（hash-based） =====
window.addEventListener('hashchange', () => {
  const tab = location.hash.replace('#', '') || 'habits';
  if (['habits','todos','history','rewards'].includes(tab)) { switchTab(tab); if (tab === 'history') showHistory(); }
});

// 初始加载时读取 hash
const initTab = location.hash.replace('#', '') || 'habits';
if (['habits','todos','history','rewards'].includes(initTab) && initTab !== state.tab) {
  switchTab(initTab);
  if (initTab === 'history') showHistory();
}
</script>
</body>
</html>
