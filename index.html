<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>习惯大陆 · 养成好习惯</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;
  background:#f2f0eb;
  min-height:100vh;
  color:#3c3c3c;
  overflow-x:hidden;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#f2f0eb}
::-webkit-scrollbar-thumb{background:#58CC02;border-radius:4px}
button{border:none;cursor:pointer;font-family:inherit;transition:.25s ease}
button:active{transform:scale(.95)}
button:disabled{opacity:.4!important;pointer-events:none}

/* ===== TOP BAR (Duolingo: white bar, green accents) ===== */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  background:#fff;
  border-radius:0 0 20px 20px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  position:sticky;top:0;z-index:100;
}
.app-title{
  font-size:22px;font-weight:800;
  color:#3c3c3c;
  display:flex;align-items:center;gap:6px;
}
.app-title .title-icon{font-size:24px}
.top-center{display:flex;align-items:center;gap:10px}
.hearts-display{
  display:flex;gap:3px;font-size:26px;
  line-height:1;
}
.stat-pill{
  font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:4px;
  background:#f0f0f0;
  padding:4px 10px;border-radius:20px;
  color:#777;
}
.stat-pill .gem{font-size:18px;color:#58CC02;line-height:1}
.stat-pill .exp-icon{font-size:18px;color:#A150F7;line-height:1}
.sound-btn{font-size:22px;padding:4px 8px;background:#f0f0f0;border-radius:20px;line-height:1}

/* ===== App Container ===== */
.app{max-width:480px;margin:0 auto;padding:0 12px 100px}

/* ===== CHARACTER (Duolingo-style oval avatar) ===== */
.character-area{
  text-align:center;
  padding:20px 0 12px;
  position:relative;
}
.character-box{position:relative;display:inline-block;margin-bottom:8px}
.character{
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(145deg,#58CC02,#46a302);
  display:flex;align-items:center;justify-content:center;
  font-size:44px;
  transition:all 0.3s ease;
  box-shadow:0 6px 24px rgba(88,204,2,.35),0 0 0 4px rgba(88,204,2,.15);
  cursor:pointer;user-select:none;position:relative;
}
.character:active{transform:scale(.95)}
.character.happy{animation:bounce .4s ease}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-14px)}60%{transform:translateY(-7px)}}
.level-ring{
  position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;
  border-radius:50%;border:3px solid transparent;
  transition:border-color .5s;
}
.char-accessory{position:absolute;font-size:20px;transition:all .3s}
.char-hat{top:-14px;right:-6px}
.char-pet{bottom:-4px;right:-8px;font-size:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* Name & XP */
.char-name{font-size:18px;font-weight:700;color:#3c3c3c;margin-bottom:2px}
.char-title{font-size:12px;color:#aaa;margin-bottom:4px}
.char-lvl{
  font-size:11px;color:#fff;font-weight:700;
  background:#A150F7;
  display:inline-block;padding:3px 12px;border-radius:20px;
}

/* EXP Bar (Duolingo green) */
.exp-section{margin:0 4px 14px}
.exp-bar-bg{
  background:#e5e5e5;
  border-radius:20px;height:12px;overflow:hidden;
}
.exp-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#58CC02,#46a302);
  border-radius:20px;
  transition:width .6s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.exp-bar-fill::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));
  border-radius:20px;
}
.exp-label{
  display:flex;justify-content:space-between;
  font-size:11px;color:#aaa;margin-top:4px;padding:0 2px;
}

/* ===== STATS ROW (Duolingo card style) ===== */
.stats-row{
  display:flex;justify-content:center;gap:12px;
  padding:14px 16px;
  background:#fff;
  border-radius:16px;
  margin:0 4px 14px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.stat-item{text-align:center;min-width:56px}
.stat-icon{font-size:32px;margin-bottom:4px;line-height:1}
.stat-value{font-size:20px;font-weight:800;color:#3c3c3c;margin-bottom:2px}
.stat-label{font-size:10px;color:#aaa}

/* ===== TABS (Duolingo pill style - text only, no emoji) ===== */
.tabs{
  display:flex;gap:4px;margin-bottom:12px;
  background:#e8e8e8;
  border-radius:14px;padding:4px;
}
.tab{
  flex:1;padding:10px 4px;border:none;border-radius:11px;
  font-size:13px;font-weight:700;cursor:pointer;
  background:transparent;color:#888;
  transition:all .25s;white-space:nowrap;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.tab:hover{color:#555}
.tab.active{
  background:#fff;
  color:#3c3c3c;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.tab .badge{
  background:#FF4B4B;color:#fff;font-size:10px;
  padding:2px 6px;border-radius:8px;font-weight:700;
}

/* ===== TASK CARD (Duolingo white card style) ===== */
.task-list{display:flex;flex-direction:column;gap:8px;padding-bottom:8px}
.task-list.hidden{display:none}

.task-card{
  background:#fff;
  border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .2s;
  border:2px solid transparent;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  position:relative;
}
.task-card:active{transform:scale(.98)}
.task-card:hover{
  box-shadow:0 4px 16px rgba(0,0,0,.1);
  border-color:#58CC02;
}

/* left color bar */
.task-card::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:transparent;transition:background .3s;
  border-radius:14px 0 0 14px;
}
.task-card[data-type="habit"]::before{background:#58CC02}
.task-card[data-type="daily"]::before{background:#1cb0f6}
.task-card[data-type="todo"]::before{background:#ff9600}
.task-card[data-type="reward"]::before{background:#c054f7}

.task-card.completed{opacity:.55}
.task-card.completed .task-text{text-decoration:line-through;color:#aaa}

/* Check button */
.task-check{
  width:32px;height:32px;border-radius:50%;
  border:2.5px solid #dcdcdc;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:14px;font-weight:700;
  background:transparent;color:transparent;
  transition:all .25s;
}
.task-card.completed .task-check{
  background:#58CC02;border-color:#58CC02;color:#fff;
  box-shadow:0 2px 8px rgba(88,204,2,.4);
}
.task-card[data-type="reward"] .task-check{border-color:#c054f7}
.task-card[data-type="reward"].completed .task-check{background:#c054f7;border-color:#c054f7;color:#fff}

/* Big emoji type icon on card */
.task-type-icon{
  font-size:32px;line-height:1;flex-shrink:0;
  width:36px;text-align:center;
}

.task-body{flex:1;min-width:0}
.task-text{font-size:15px;font-weight:700;line-height:1.3;color:#3c3c3c}
.task-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}

/* Tags - BIG emoji version */
.tag{
  font-size:11px;padding:2px 7px;border-radius:6px;font-weight:700;
}
.tag-easy{background:#e8f5e9;color:#4caf50}
.tag-medium{background:#fff8e1;color:#f57f17}
.tag-hard{background:#ffebee;color:#e53935}
.tag-value{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;
  background:#f5f5f5;color:#888;
}
.tag-icon{font-size:16px;padding:0;border-radius:4px}
.streak-badge{
  background:#fff3e0;color:#e65100;
  font-size:11px;padding:2px 7px;border-radius:6px;font-weight:700;
}
.price-tag{
  background:#f3e5f5;color:#7b1fa2;
  font-size:11px;padding:2px 7px;border-radius:6px;font-weight:700;
}

/* Floating score */
.float-score{
  position:absolute;right:-4px;top:4px;
  font-weight:800;font-size:12px;
  pointer-events:none;z-index:10;
  animation:floatUp 1s ease forwards;
}
.float-score.exp{color:#58CC02}
.float-score.gp{color:#ff9600}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-30px) scale(1.2)}
}

/* ===== Reward Shop ===== */
.reward-detail{font-size:11px;color:#aaa;margin-top:3px}

/* ===== ADD BUTTON (Duolingo FAB) ===== */
.add-btn-wrap{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:100;
}
.btn-add{
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,#58CC02,#46a302);
  color:#fff;font-size:28px;font-weight:400;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(88,204,2,.5),0 0 0 5px rgba(88,204,2,.15);
  transition:all .25s;
  display:flex;align-items:center;justify-content:center;
}
.btn-add:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(88,204,2,.6),0 0 0 7px rgba(88,204,2,.2)}
.btn-add:active{transform:scale(.95)}

/* ===== ADD SHEET (Duolingo white sheet) ===== */
.add-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4);
  z-index:200;display:none;
  align-items:flex-end;justify-content:center;
}
.add-overlay.show{display:flex}
.add-sheet{
  background:#fff;
  border-radius:24px 24px 0 0;
  padding:28px 20px 40px;
  width:100%;max-width:480px;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.add-sheet h3{
  font-size:18px;margin-bottom:16px;text-align:center;
  color:#3c3c3c;font-weight:800;
}
.add-sheet input,.add-sheet select{
  width:100%;padding:13px 14px;
  background:#f7f7f7;
  border:2px solid #e8e8e8;
  border-radius:12px;font-size:15px;color:#3c3c3c;
  outline:none;transition:border-color .2s;margin-bottom:10px;
  font-family:inherit;
}
.add-sheet input:focus{border-color:#58CC02}
.add-sheet input::placeholder{color:#bbb}
.add-sheet select option{background:#fff;color:#3c3c3c}
.add-sheet .row{display:flex;gap:8px}
.add-sheet .row select{flex:1}
.btn{
  padding:14px 20px;border:none;border-radius:12px;
  font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .2s;width:100%;margin-top:8px;
}
.btn-primary{
  background:linear-gradient(135deg,#58CC02,#46a302);
  color:#fff;
  box-shadow:0 4px 16px rgba(88,204,2,.35);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(88,204,2,.45)}
.btn-ghost{background:transparent;color:#aaa}

/* ===== LEVEL UP MODAL (Duolingo style) ===== */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(4px);
  z-index:300;display:none;
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex}
.modal{
  background:#fff;
  border-radius:28px;padding:40px 28px;
  max-width:340px;width:88%;
  text-align:center;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
@keyframes popIn{
  from{transform:scale(.3) translateY(60px);opacity:0}
  to{transform:scale(1) translateY(0);opacity:1}
}
.modal .big{font-size:72px;display:block;margin-bottom:12px}
.modal h2{font-size:26px;margin-bottom:8px;color:#3c3c3c;font-weight:800}
.modal p{color:#aaa;font-size:14px;margin-bottom:24px}
.btn-gold{
  background:linear-gradient(135deg,#ff9600,#ff7800);
  color:#fff;
  width:100%;
  box-shadow:0 4px 20px rgba(255,150,0,.4);
}

/* ===== TOAST ===== */
.toast-container{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:400;display:flex;flex-direction:column;gap:6px;
  pointer-events:none;align-items:center;
}
.toast{
  background:rgba(60,60,60,.92);
  color:#fff;padding:12px 22px;border-radius:14px;
  font-weight:700;font-size:14px;white-space:nowrap;
  animation:toastIn .3s ease,toastOut .3s ease 2.2s forwards;
  pointer-events:auto;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* ===== CONFETTI ===== */
.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:500;overflow:hidden}
.confetti-piece{
  position:absolute;width:10px;height:10px;top:-12px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* ===== EMPTY STATE ===== */
.empty-state{
  text-align:center;padding:36px 16px;
  background:#fff;border-radius:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state p{font-size:14px;color:#aaa}

/* ===== RESPONSIVE ===== */
@media(max-width:400px){
  .character-box{width:76px;height:76px}
  .character{width:76px;height:76px;font-size:38px}
  .stats-row{gap:10px}
  .stat-item{min-width:44px}
  .task-card{padding:12px 14px}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-3px)}
  40%{transform:translateX(3px)}
  60%{transform:translateX(-2px)}
  80%{transform:translateX(2px)}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <span class="app-title"><span class="title-icon">🏰</span> 习惯大陆</span>
    <div class="top-center">
      <div class="hearts-display" id="heartsDisplay"></div>
      <div class="stat-pill"><span class="gem">💎</span> <span id="statGp">0</span></div>
      <div class="stat-pill"><span class="exp-icon">✨</span> <span id="statExp">0</span></div>
    </div>
    <button class="sound-btn" id="soundBtn">🔊</button>
  </div>

  <!-- ===== CHARACTER ===== -->
  <div class="character-area">
    <div class="character-box">
      <div class="level-ring" id="levelRing"></div>
      <div class="character" id="character" onclick="pokeCharacter()">🌱</div>
      <div class="char-accessory char-hat" id="charHat"></div>
      <div class="char-pet" id="charPet">⭐</div>
    </div>
    <div class="char-name" id="charName">小勇士</div>
    <div class="char-title" id="charTitle">🌱 萌芽新手</div>
    <div class="char-lvl" id="charLvl">Lv.1</div>
  </div>

  <!-- ===== EXP BAR ===== -->
  <div class="exp-section">
    <div class="exp-bar-bg">
      <div class="exp-bar-fill" id="expBarFill"></div>
    </div>
    <div class="exp-label">
      <span>经验值</span>
      <span id="expLabel">0 / 25</span>
    </div>
  </div>

  <!-- ===== STATS ROW ===== -->
  <div class="stats-row">
    <div class="stat-item"><div class="stat-icon">💎</div><div class="stat-value" id="statGp2">0</div><div class="stat-label">金币</div></div>
    <div class="stat-item"><div class="stat-icon">🔥</div><div class="stat-value" id="statStreak">0</div><div class="stat-label">最高连击</div></div>
    <div class="stat-item"><div class="stat-icon">✅</div><div class="stat-value" id="statDone">0</div><div class="stat-label">今日完成</div></div>
    <div class="stat-item"><div class="stat-icon">🏆</div><div class="stat-value" id="statDay">1</div><div class="stat-label">天数</div></div>
  </div>

  <!-- ===== TABS ===== -->
  <div class="tabs">
    <button class="tab active" data-tab="habits" onclick="switchTab('habits')">习惯</button>
    <button class="tab" data-tab="dailies" onclick="switchTab('dailies')">每日 <span class="badge" id="dailyBadge">0</span></button>
    <button class="tab" data-tab="todos" onclick="switchTab('todos')">待办</button>
    <button class="tab" data-tab="rewards" onclick="switchTab('rewards')">商店</button>
  </div>

  <!-- ===== TASK LISTS ===== -->
  <div id="habitsList" class="task-list"></div>
  <div id="dailiesList" class="task-list hidden"></div>
  <div id="todosList" class="task-list hidden"></div>
  <div id="rewardsList" class="task-list hidden"></div>

  <!-- ===== ADD BUTTON ===== -->
  <div class="add-btn-wrap">
    <button class="btn-add" onclick="showAddSheet()" id="addBtn">＋</button>
  </div>
</div>

<!-- ===== ADD SHEET ===== -->
<div class="add-overlay" id="addOverlay" onclick="hideAddSheet(event)">
  <div class="add-sheet" onclick="event.stopPropagation()">
    <h3>新任务</h3>
    <input type="text" id="newText" placeholder="任务名称…" maxlength="40" autocomplete="off">
    <div class="row">
      <select id="newType">
        <option value="habit">习惯</option>
        <option value="daily" selected>每日</option>
        <option value="todo">待办</option>
        <option value="reward">奖励</option>
      </select>
      <select id="newPriority">
        <option value="easy">普通</option>
        <option value="medium">重要</option>
        <option value="hard">超重要</option>
      </select>
    </div>
    <div class="row" id="rewardPriceRow" style="display:none">
      <input type="number" id="newPrice" placeholder="金币价格" min="1" value="20">
    </div>
    <button class="btn btn-primary" onclick="addTask()">＋ 添加</button>
    <button class="btn btn-ghost" onclick="hideAddSheet()">取消</button>
  </div>
</div>

<!-- ===== LEVEL UP MODAL ===== -->
<div class="modal-overlay" id="lvlModal">
  <div class="modal">
    <span class="big" id="lvlEmoji">🎉</span>
    <h2 id="lvlTitle">升级了！</h2>
    <p id="lvlDesc">太棒了，继续加油！</p>
    <button class="btn btn-gold" onclick="closeLvlModal()">太好啦！</button>
  </div>
</div>

<!-- ===== TOAST CONTAINER ===== -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ================================================================
// MINI-HABITS GAME ENGINE (保留原有核心逻辑)
// ================================================================

// --- 常量 ---
const MAX_LEVEL = 50;
const BEXP = 6, BGP = 1;
const MAX_TV = 21.27, MIN_TV = -47.27, DECAY = 0.9747, CLOSE = 0.00001;
const PMUL = { easy: 1, medium: 1.5, hard: 2 };
const STREAK_BONUS = 0.01;
const STREAK_MS = 7;

const TITLES = [
  { l: 1, t: '🌱 萌芽新手' }, { l: 5, t: '🌿 坚持学徒' },
  { l: 10, t: '🌳 习惯小树' }, { l: 15, t: '⭐ 一星达人' },
  { l: 21, t: '🔥 连击勇士' }, { l: 30, t: '🌟 二星达人' },
  { l: 42, t: '⚡ 连击大师' }, { l: 50, t: '👑 习惯之王' },
];

const CHAR_EVOLVE = [
  { min: 1, emoji: '🌱', hat: '', pet: '⭐', ring: '#58CC02' },
  { min: 5, emoji: '🌿', hat: '🌻', pet: '🐣', ring: '#1cb0f6' },
  { min: 10, emoji: '🌳', hat: '🎩', pet: '🐥', ring: '#ff9600' },
  { min: 15, emoji: '⭐', hat: '👑', pet: '🐰', ring: '#c054f7' },
  { min: 21, emoji: '🔥', hat: '🏮', pet: '🦊', ring: '#ff4b4b' },
  { min: 30, emoji: '🌟', hat: '🌈', pet: '🦄', ring: '#A150F7' },
  { min: 42, emoji: '⚡', hat: '⚡', pet: '🐉', ring: '#00cfff' },
  { min: 50, emoji: '👑', hat: '👑', pet: '🦅', ring: '#ff9600' },
];

// --- 核心算法 ---
function clampV(v) { return Math.max(MIN_TV, Math.min(MAX_TV, v)); }
function calcDelta(v, d) { return DECAY ** clampV(v) * (d === 'down' ? -1 : 1); }
function calcRevDelta(v, d) {
  let c = clampV(v), t = c + DECAY ** c * (d === 'down' ? -1 : 1);
  while (true) { let x = t + DECAY ** t, d2 = c - x; if (Math.abs(d2) < CLOSE) break; t += d2 > 0 ? -d2 : d2; }
  return t - c;
}
function pmul(p) { return PMUL[p] ?? 1; }
function expToLv(l) { if (l < 5) return 25 * l; if (l === 5) return 150; return Math.round(((l ** 2) * 0.25 + 10 * l + 139.75) / 10) * 10; }
function getTitle(l) { let t = ''; for (const e of TITLES) { if (l >= e.l) t = e.t; else break; } return t; }
function streakMs(s) { return s > 0 && s % STREAK_MS === 0; }
function streakMul(s) { return 1 + s * STREAK_BONUS; }
function rd(v, d) { return Math.round(v * (10 ** d)) / (10 ** d); }
function gid() { return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }
function sameDay(ts) { const d = new Date(ts), n = new Date(); return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate(); }
function toDateStr(d) { return d.toISOString().slice(0, 10); }

// --- 任务创建 ---
function taskDef(b) {
  const t = { _id: gid(), type: b.type || 'habit', text: b.text || '新任务', notes: '', value: b.value ?? 0, priority: b.priority || 'easy', createdAt: new Date() };
  if (t.type === 'habit') { t.up = true; t.down = true; t.counterUp = 0; t.counterDown = 0; t.history = []; }
  if (t.type === 'daily') { t.completed = false; t.streak = 0; t.frequency = 'weekly'; t.repeat = { m: true, t: true, w: true, th: true, f: true, s: true, su: true }; t.startDate = new Date(); t.history = []; }
  if (t.type === 'todo') { t.completed = false; t.dateCompleted = null; t.checklist = []; }
  if (t.type === 'reward') { t.value = b.value ?? 20; }
  return t;
}

// --- 评分核心 ---
function scoreTask(user, task, dir = 'up', times = 1, cron = false) {
  const st = { exp: user.stats.exp, gp: user.stats.gp };
  if (task.type === 'reward' && task.value > user.stats.gp) throw Error('no_gp');
  const oldLvl = user._tmp?.leveledUp;
  user._tmp = {};
  if (oldLvl) user._tmp.leveledUp = oldLvl;

  if (task.type === 'habit') _sHabit(user, task, dir, times, cron, st);
  else if (task.type === 'daily') _sDaily(user, task, dir, times, cron, st);
  else if (task.type === 'todo') _sTodo(user, task, dir, times, cron, st);
  else if (task.type === 'reward') st.gp -= task.value;

  _upStats(user, st);
  user._tmp.delta = st.gp - (user._tmp._prevGp ?? user.stats.gp) + user.stats.gp;
}

function _chgVal(user, task, dir, times, cron) {
  let t = 0;
  for (let i = 0; i < times; i++) {
    const d = !cron && dir === 'down' ? calcRevDelta(task.value, dir) : calcDelta(task.value, dir);
    if (task.type !== 'reward') task.value += d;
    t += d;
  }
  return t;
}
function _addExp(st, task, delta, dir) {
  st.exp += Math.max(0, rd(delta * pmul(task.priority) * (dir === 'up' && task.streak ? streakMul(task.streak) : 1) * BEXP));
}
function _addGP(st, task, delta, dir) {
  st.gp += Math.max(0, rd(delta * pmul(task.priority) * (dir === 'up' && task.streak ? streakMul(task.streak) : 1) * BGP));
}
function _sHabit(u, t, dir, times, cron, st) {
  const d = _chgVal(u, t, dir, times, cron);
  if (d > 0) { _addExp(st, t, d, dir); _addGP(st, t, d, dir); }
  if (dir === 'up') t.counterUp = (t.counterUp || 0) + times; else t.counterDown = (t.counterDown || 0) + times;
  t.history = t.history || [];
  const l = t.history[t.history.length - 1];
  if (l && sameDay(l.date)) { l.value = t.value; l.scoredUp = (l.scoredUp || 0) + (dir === 'up' ? times : 0); l.scoredDown = (l.scoredDown || 0) + (dir === 'down' ? times : 0); }
  else t.history.push({ date: Date.now(), value: t.value, scoredUp: dir === 'up' ? times : 0, scoredDown: dir === 'down' ? times : 0 });
}
function _sDaily(u, t, dir, times, cron, st) {
  if (cron) { _chgVal(u, t, dir, times, cron); t.streak = 0; t.completed = false; }
  else {
    const d = _chgVal(u, t, dir, times, cron);
    if (dir === 'up') {
      _addExp(st, t, d, dir); _addGP(st, t, d, dir);
      t.streak = (t.streak || 0) + 1; t.completed = true;
      t.history = t.history || []; t.history.push({ date: Date.now(), value: t.value, completed: true });
      if (streakMs(t.streak)) u._tmp.streakMs = t.streak;
    } else {
      t.streak = Math.max(0, (t.streak || 0) - 1); t.completed = false;
      if (t.history && t.history.length > 0) t.history.pop();
    }
  }
}
function _sTodo(u, t, dir, times, cron, st) {
  if (dir === 'up') {
    t.completed = true; t.dateCompleted = new Date();
    const d = _chgVal(u, t, dir, 1, cron); _addExp(st, t, d, dir); _addGP(st, t, d, dir);
  } else { t.completed = false; t.dateCompleted = null; _chgVal(u, t, dir, 1, cron); }
}
function _upStats(user, st) {
  user.stats.gp = Math.max(0, rd(st.gp)); user.stats.exp = Math.max(0, st.exp);
  let e = st.exp, en = expToLv(user.stats.lvl);
  if (e < en) return;
  const il = user.stats.lvl; let lv = false;
  while (e >= en) {
    e -= en;
    if (user.stats.lvl >= MAX_LEVEL) { user.stats.lvl = MAX_LEVEL; break; }
    user.stats.lvl += 1; lv = true;
    const nt = getTitle(user.stats.lvl);
    if (nt && user.stats.title !== nt) user.stats.title = nt;
    en = expToLv(user.stats.lvl);
  }
  user.stats.exp = rd(e);
  if (lv) {
    if (!user._tmp) user._tmp = {};
    if (!user._tmp.leveledUp) user._tmp.leveledUp = [];
    user._tmp.leveledUp.push({ il, nl: user.stats.lvl, title: user.stats.title });
  }
}

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = true;

function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playTone(freq, dur, type = 'sine', vol = 0.3) {
  if (!soundEnabled) return;
  try {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
function playTask() { playTone(523, 0.1); setTimeout(() => playTone(659, 0.1), 80); setTimeout(() => playTone(784, 0.18), 160); }

// task type icon map (BIG emoji on cards) — replaced by getTaskEmoji
const PRIORITY_ICON = { easy: '🟢', medium: '🟡', hard: '🔴' };

// Keyword-based emoji for task cards
function getTaskEmoji(text) {
  const t = text.toLowerCase();
  if (/走|步|跑|跑步|走路/.test(t)) return '🚶';
  if (/水|喝|杯/.test(t)) return '💧';
  if (/书|阅读|读书/.test(t)) return '📖';
  if (/整理|打扫|清洁|拖地|擦/.test(t)) return '🧹';
  if (/日记|写/.test(t)) return '✏️';
  if (/画|美术|画画/.test(t)) return '🎨';
  if (/游戏|玩/.test(t)) return '🎮';
  if (/冰淇淋|甜品|糖/.test(t)) return '🍦';
  if (/电视|动画|看.+集|看.+片/.test(t)) return '📺';
  if (/手机|刷/.test(t)) return '📱';
  if (/科学|实验/.test(t)) return '🔬';
  if (/作业|学习/.test(t)) return '📚';
  if (/运动|健身/.test(t)) return '🏃';
  if (/早餐|午餐|晚餐|吃饭/.test(t)) return '🍽️';
  if (/睡觉|睡眠|早睡/.test(t)) return '😴';
  if (/单词|英语|背/.test(t)) return '📝';
  if (/冥想|放松/.test(t)) return '🧘';
  if (/习惯/.test(t)) return '🔁';
  // 默认
  return '✨';
}

function renderTasks() {
  const tab = state.tab;
  const map = { habits: 'habitsList', dailies: 'dailiesList', todos: 'todosList', rewards: 'rewardsList' };
  for (const [k, id] of Object.entries(map)) {
    const el = document.getElementById(id);
    const tasks = state.tasks.filter(t => {
      if (k === 'habits') return t.type === 'habit';
      if (k === 'dailies') return t.type === 'daily';
      if (k === 'todos') return t.type === 'todo';
      if (k === 'rewards') return t.type === 'reward';
      return false;
    });
    if (tasks.length === 0) {
      const icons = { habits: '🔁', dailies: '📆', todos: '📋', rewards: '🎁' };
      el.innerHTML = `<div class="empty-state"><div class="icon">${icons[k] || '✨'}</div><p>还没有任务，点 + 添加吧！</p></div>`;
    } else {
      el.innerHTML = tasks.map(t => cardHTML(t, k === 'rewards')).join('');
    }
  }
}
function cardHTML(task, isReward) {
  const done = task.completed || false;
  const v = rd(task.value, 2);
  let vl = '−';
  if (v > 1) vl = `+${v}`;
  else if (v < -1) vl = v;
  else vl = v.toFixed(1);

  // BIG emoji type icon (keyword-based)
  const typeIcon = getTaskEmoji(task.text);
  const prioIcon = PRIORITY_ICON[task.priority] || '';

  let meta = `<span class="tag tag-icon">${prioIcon}</span> <span class="tag tag-${task.priority}">${task.priority === 'hard' ? '超重要' : task.priority === 'medium' ? '重要' : '普通'}</span> <span class="tag-value">${vl}</span>`;
  if (task.type === 'daily' && task.streak > 0) meta += ` <span class="streak-badge">🔥×${task.streak}</span>`;
  if (isReward) meta += ` <span class="price-tag">🪙${task.value}</span>`;

  const check = done ? '✓' : (isReward ? '🛒' : '');
  return `<div class="task-card ${done ? 'completed' : ''}" data-type="${task.type}" data-id="${task._id}" onclick="clickTask('${task._id}')">
    <div class="task-check">${check}</div>
    <div class="task-type-icon">${typeIcon}</div>
    <div class="task-body">
      <div class="task-text">${esc(task.text)}</div>

      ${isReward ? `<div class="reward-detail">做完任务赚金币来换奖励吧！</div>` : ''}

}

// INTERACTIONS
// ================================================================
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  ['habitsList', 'dailiesList', 'todosList', 'rewardsList'].forEach(id => document.getElementById(id).classList.toggle('hidden', id.replace('List', '') !== tab));
  renderTasks();
}

function clickTask(id) {
  const task = state.tasks.find(t => t._id === id);
  if (!task) return;

  if (task.type === 'reward') {
    try {
      const before = state.user.stats.gp;
      scoreTask(state.user, task, 'up');
      render();
      spawnFloat(task, 'gp', before);
      showToast(`🎉 兑换了「${task.text}」！`);
      happyChar();
    } catch (e) {
      showToast(`😅 金币不够，多做任务攒钱吧！`);
      playNoGP();
      shakeChar();
    }
    return;
  }

  if (task.type === 'todo' && task.completed) { scoreTask(state.user, task, 'down'); render(); return; }
  if (task.type === 'todo' && !task.completed) { _doComplete(task); return; }
  if (task.type === 'daily') { if (task.completed) { scoreTask(state.user, task, 'down'); render(); } else { _doComplete(task); } render(); checkUp(); return; }
  if (task.type === 'habit') { _doComplete(task); render(); checkUp(); }
}

function _doComplete(task) {
  const beforeGP = state.user.stats.gp;
  const beforeExp = state.user.stats.exp;
  if (state.hearts <= 0) { showToast('💔 爱心耗尽！先恢复再说吧'); return; }
  scoreTask(state.user, task, 'up');
  state.todayDone++;
  const gpGain = rd(state.user.stats.gp - beforeGP);
  const expGain = rd(state.user.stats.exp - beforeExp);
  if (expGain > 0) spawnFloat(task, 'exp', beforeExp);
  if (gpGain > 0) spawnFloat(task, 'gp', beforeGP);
  happyChar();
  playTask();
  // Streak tracking
  if (task.type === 'daily') {
    const today = toDateStr(new Date());
    const yesterday = toDateStr(new Date(Date.now() - 86400000));
    if (state.lastHeartsCheck === yesterday || state.lastHeartsCheck === null) {
      state.streak++;
    } else if (state.lastHeartsCheck !== today) {
      state.streak = 1;
    }
    state.lastHeartsCheck = today;
    state.dayCount++;
    if (streakMs(state.streak)) {
      playStreak();
      showModal('🔥🔥🔥', `连续 ${state.streak} 天！`, `超级奖励！+50💎 +1❤️ +50XP`, '太厉害了！');
      state.user.stats.gp += 50;
      gainHeart();
      state.user.stats.exp += 50;
      render();
    }
    _checkHeartsPenalty();
  }
}

function _checkHeartsPenalty() {
  const today = toDateStr(new Date());
  if (state.lastHeartsCheck === today) return;
  const dailies = state.tasks.filter(t => t.type === 'daily');
  const allDone = dailies.every(t => t.completed);
  if (!allDone && state.lastHeartsCheck !== null) {
    const yesterday = toDateStr(new Date(Date.now() - 86400000));
    if (state.lastHeartsCheck !== today) {
      if (loseHeart()) {
        showToast('💔 昨日有未完成的每日任务，扣了1颗爱心');
      }
    }
  }
}

function spawnFloat(task, type, before) {
  const cards = document.querySelectorAll(`.task-card[data-id="${task._id}"]`);
  if (cards.length === 0) return;
  const card = cards[0];
  const el = document.createElement('div');
  el.className = `float-score ${type}`;
  const val = type === 'exp' ? rd(state.user.stats.exp - before) : rd(state.user.stats.gp - before);
  el.textContent = type === 'exp' ? `+${val}⭐` : `+${val}🪙`;

  document.getElementById('addOverlay').classList.add('show');
  setTimeout(() => document.getElementById('newText').focus(), 100);
  document.getElementById('rewardPriceRow').style.display = 'none';
}
function hideAddSheet(e) { if (e && e.target !== e.currentTarget) return; document.getElementById('addOverlay').classList.remove('show'); }
function addTask() {
  const text = document.getElementById('newText').value.trim();
  if (!text) { showToast('请输入任务名称'); return; }
  const type = document.getElementById('newType').value;
  const priority = document.getElementById('newPriority').value;
  const value = type === 'reward' ? parseInt(document.getElementById('newPrice').value) || 20 : undefined;
  const task = taskDef({ type, text, priority, value });
  state.tasks.push(task);
  document.getElementById('newText').value = '';
  hideAddSheet();
  const tabMap = { habit: 'habits', daily: 'dailies', todo: 'todos', reward: 'rewards' };
  switchTab(tabMap[type]);
  showToast(`✅ 添加了「${text}」`);
  render();
}
document.getElementById('newType').addEventListener('change', function () {
  document.getElementById('rewardPriceRow').style.display = this.value === 'reward' ? 'flex' : 'none';
});

// ===== TOAST =====
let toastTimeout;
function showToast(msg) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ===== CONFETTI =====
function confetti() {
  const c = document.createElement('div');
  c.className = 'confetti-container';
  document.body.appendChild(c);
  const colors = ['#58CC02','#1cb0f6','#ff9600','#c054f7','#ff4b4b','#ffd700','#00cfff','#A150F7'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (Math.random() * 8 + 4) + 'px';
    p.style.height = (Math.random() * 8 + 4) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    p.style.animationDelay = (Math.random() * 0.8) + 's';
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 4000);
}

// ===== MODAL =====
function showModal(emoji, title, desc, btn) {
  document.getElementById('lvlEmoji').textContent = emoji;
  document.getElementById('lvlTitle').textContent = title;
  document.getElementById('lvlDesc').textContent = desc;
  document.querySelector('.btn-gold').textContent = btn + '🎉';
  document.getElementById('lvlModal').classList.add('show');
  confetti();
}

// ===== SOUND TOGGLE =====
document.getElementById('soundBtn').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
  if (soundEnabled) playTask();
  saveState();
});

// ===== MODAL CLOSE =====
document.getElementById('lvlModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) document.getElementById('lvlModal').classList.remove('show');
});

// ===== INIT =====
loadState();
soundEnabled = localStorage.getItem('mh_sound') !== 'off';
document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
document.getElementById('expBarFill').style.width = '0%';
render();
saveState();
console.log('🏰 习惯大陆 · 多邻国风格 UI (大 emoji 图标)');
</script>
</body>
