<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>习惯大陆 · 成人版</title>
<style>
  /* ===== RESET & BASE ===== */
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e0e0ff;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:#0d0d2b}
  ::-webkit-scrollbar-thumb{background:#5a3d9e;border-radius:4px}
  button{border:none;cursor:pointer;font-family:inherit;transition:.25s ease}
  button:active{transform:scale(.94)}
  button:disabled{opacity:.4!important;pointer-events:none}

  /* ===== HEADER ===== */
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#0d0d2b;border-bottom:1px solid rgba(90,61,158,.3);position:sticky;top:0;z-index:100}
  .top-left{display:flex;align-items:center;gap:14px}
  .app-title{font-size:22px;font-weight:800;background:linear-gradient(135deg,#c084fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
  .top-center{display:flex;align-items:center;gap:18px}
  .hearts{display:flex;gap:3px;font-size:22px;line-height:1}
  .gem-display{font-size:18px;font-weight:700;display:flex;align-items:center;gap:4px;background:rgba(129,140,248,.12);padding:4px 12px;border-radius:20px;border:1px solid rgba(129,140,248,.2)}
  .xp-display{font-size:14px;color:#a5b4fc;background:rgba(165,180,252,.1);padding:4px 12px;border-radius:20px}
  .sound-toggle{font-size:24px;padding:4px 10px;background:rgba(255,255,255,.05);border-radius:20px;border:1px solid rgba(255,255,255,.1)}

  /* ===== TABS ===== */
  .tabs{display:flex;background:#0d0d2b;border-bottom:1px solid rgba(90,61,158,.2);overflow-x:auto;flex-shrink:0}
  .tab{flex:1;min-width:0;padding:10px 0;text-align:center;font-size:13px;font-weight:600;color:#6b7280;background:transparent;border-bottom:3px solid transparent;white-space:nowrap}
  .tab.active{color:#c084fc;border-bottom-color:#c084fc;background:rgba(192,132,252,.06)}
  .tab-icon{font-size:20px;display:block;margin-bottom:2px}

  /* ===== MAIN CONTENT ===== */
  .page{display:none;flex-direction:column;flex:1;overflow-y:auto;padding:16px 0 100px}
  .page.active{display:flex}
  .tab-content{flex:1;display:contents}

  /* ===== BOARD (闯关路径 - horizontal scroll) ===== */
  .board-wrap{overflow-x:auto;padding:20px 16px 30px;-webkit-overflow-scrolling:touch;flex:1}
  .board-track{display:flex;gap:10px;min-width:max-content;padding:12px 8px;position:relative}
  .board-node{width:72px;height:72px;border-radius:16px;background:linear-gradient(145deg,#1e1b4b,#0d0d2b);border:2px solid rgba(192,132,252,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative;transition:.3s;cursor:pointer;box-shadow:0 0 12px rgba(192,132,252,.08)}
  .board-node:hover{border-color:#c084fc;box-shadow:0 0 20px rgba(192,132,252,.25)}
  .board-node.completed{background:linear-gradient(145deg,#1a1a4e,#2d1b69);border-color:#a78bfa;box-shadow:0 0 20px rgba(167,139,250,.3)}
  .board-node.locked{opacity:.5;filter:grayscale(.6);pointer-events:none}
  .board-node .node-day{font-size:12px;color:#94a3b8}
  .board-node .node-icon{font-size:28px;margin:4px 0}
  .board-node .node-label{font-size:9px;color:#c4b5fd;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .board-node .checkmark{position:absolute;top:-6px;right:-6px;font-size:18px}
  .board-node.treasure{border-color:#f59e0b;box-shadow:0 0 24px rgba(245,158,11,.35);background:linear-gradient(145deg,#2d1b69,#1a1a4e)}
  .board-node.treasure .node-icon{font-size:32px}
  .board-path-connector{flex-shrink:0;width:8px;height:8px;border-radius:50%;background:#c084fc;margin:auto -3px;box-shadow:0 0 10px rgba(192,132,252,.5)}

  /* ===== DAILY QUESTS ===== */
  .quests-container{padding:16px}
  .quest-card{background:linear-gradient(145deg,#1e1b4b,#151338);border:1px solid rgba(192,132,252,.15);border-radius:16px;padding:16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
  .quest-card .q-info{flex:1}
  .quest-card .q-title{font-weight:700;font-size:16px;margin-bottom:4px}
  .quest-card .q-desc{font-size:13px;color:#94a3b8}
  .quest-card .q-reward{font-size:12px;color:#a78bfa;display:flex;gap:8px;margin-top:6px}
  .quest-card .q-btn{padding:8px 20px;border-radius:30px;font-weight:700;font-size:14px;white-space:nowrap;background:linear-gradient(135deg,#f97316,#fb923c);color:#fff;box-shadow:0 4px 14px rgba(249,115,22,.3)}
  .quest-card .q-btn.done{background:#374151;color:#9ca3af;box-shadow:none;pointer-events:none}
  .quest-refresh{text-align:center;margin-top:8px;font-size:12px;color:#6b7280}

  /* ===== SHOP / GEMS ===== */
  .shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px}
  .shop-card{background:linear-gradient(145deg,#1e1b4b,#151338);border:1px solid rgba(192,132,252,.15);border-radius:16px;padding:18px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.3)}
  .shop-card .shop-icon{font-size:36px;margin-bottom:8px}
  .shop-card .shop-name{font-weight:700;font-size:15px;margin-bottom:4px}
  .shop-card .shop-desc{font-size:12px;color:#94a3b8;margin-bottom:10px}
  .shop-card .shop-btn{padding:8px 24px;border-radius:30px;font-weight:700;font-size:14px;background:linear-gradient(135deg,#f97316,#fb923c);color:#fff;box-shadow:0 4px 14px rgba(249,115,22,.3)}

  /* ===== PROFILE / STATS ===== */
  .profile-section{padding:16px;display:flex;flex-direction:column;gap:14px}
  .stat-row{display:flex;justify-content:space-between;background:rgba(30,27,75,.6);border-radius:12px;padding:14px 18px;border:1px solid rgba(192,132,252,.1)}
  .stat-row .stat-label{color:#94a3b8;font-size:14px}
  .stat-row .stat-value{font-weight:700;font-size:16px;color:#c4b5fd}
  .streak-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#f97316,#ef4444);padding:6px 16px;border-radius:30px;font-weight:800;font-size:18px;color:#fff;box-shadow:0 4px 20px rgba(249,115,22,.4)}
  .streak-badge.sad{background:linear-gradient(135deg,#6b7280,#4b5563);box-shadow:none}

  /* ===== ORANGE BUTTON (general) ===== */
  .btn-orange{background:linear-gradient(135deg,#f97316,#fb923c);color:#fff;font-weight:700;padding:12px 32px;border-radius:30px;font-size:16px;box-shadow:0 4px 20px rgba(249,115,22,.3)}
  .btn-orange:hover{box-shadow:0 6px 30px rgba(249,115,22,.5);transform:translateY(-1px)}

  /* ===== TOAST ===== */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e1b4b;color:#e0e0ff;padding:12px 24px;border-radius:30px;font-weight:600;font-size:15px;box-shadow:0 8px 40px rgba(0,0,0,.6);border:1px solid rgba(192,132,252,.3);z-index:999;opacity:0;transition:opacity .4s ease,transform .4s ease;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}

  /* ===== MODAL OVERLAY ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal-box{background:linear-gradient(145deg,#1e1b4b,#0d0d2b);border:1px solid rgba(192,132,252,.2);border-radius:24px;padding:32px 24px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.8)}
  .modal-box h2{font-size:26px;margin-bottom:8px}
  .modal-box .modal-icon{font-size:64px;margin-bottom:12px}
  .modal-box .modal-desc{color:#94a3b8;margin-bottom:20px;line-height:1.6}
  .modal-box .modal-btn{padding:10px 32px;border-radius:30px;font-weight:700;font-size:16px}
  .modal-box .modal-btn.primary{background:linear-gradient(135deg,#f97316,#fb923c);color:#fff;box-shadow:0 4px 16px rgba(249,115,22,.3)}
  .modal-box .modal-btn.secondary{background:rgba(255,255,255,.06);color:#c4b5fd;margin-left:10px}

  /* ===== RESPONSIVE ===== */
  @media(max-width:420px){
    .top-bar{padding:10px 12px;flex-wrap:wrap;gap:6px}
    .app-title{font-size:18px}
    .hearts{font-size:18px;gap:2px}
    .gem-display{font-size:14px;padding:2px 10px}
    .board-node{width:62px;height:62px}
    .board-node .node-icon{font-size:22px}
    .shop-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="top-bar">
  <div class="top-left">
    <span class="app-title">🏰 习惯大陆</span>
  </div>
  <div class="top-center">
    <div class="hearts" id="hearts-container"></div>
    <div class="gem-display">💎 <span id="gem-count">0</span></div>
    <div class="xp-display">✨ <span id="xp-count">0</span> XP</div>
  </div>
  <button class="sound-toggle" id="sound-toggle" title="音效开关">🔊</button>
</header>

<!-- ===== TABS ===== -->
<div class="tabs" id="tab-bar">
  <button class="tab active" data-tab="board"><span class="tab-icon">🗺️</span>闯关</button>
  <button class="tab" data-tab="quests"><span class="tab-icon">📋</span>任务</button>
  <button class="tab" data-tab="shop"><span class="tab-icon">🏪</span>商店</button>
  <button class="tab" data-tab="stats"><span class="tab-icon">📊</span>统计</button>
  <button class="tab" data-tab="daily"><span class="tab-icon">🔥</span>每日</button>
</div>

<!-- ===== PAGES ===== -->
<main>
  <!-- BOARD PAGE -->
  <div class="page active" id="page-board">
    <div class="board-wrap">
      <div class="board-track" id="board-track"></div>
    </div>
    <div style="text-align:center;padding:0 16px 16px">
      <button class="btn-orange" id="checkin-btn">✅ 今日打卡</button>
    </div>
  </div>

  <!-- QUESTS PAGE -->
  <div class="page" id="page-quests">
    <div class="quests-container" id="quests-list"></div>
  </div>

  <!-- SHOP PAGE -->
  <div class="page" id="page-shop">
    <div class="shop-grid" id="shop-grid"></div>
  </div>

  <!-- STATS PAGE -->
  <div class="page" id="page-stats">
    <div class="profile-section" id="stats-content"></div>
  </div>

  <!-- DAILY QUESTS PAGE -->
  <div class="page" id="page-daily">
    <div class="quests-container" id="daily-quests-list"></div>
  </div>
</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-icon" id="modal-icon">🎉</div>
    <h2 id="modal-title">太棒了!</h2>
    <p class="modal-desc" id="modal-desc">你完成了一项成就!</p>
    <div>
      <button class="modal-btn primary" id="modal-primary">好的</button>
      <button class="modal-btn secondary" id="modal-secondary" style="display:none">取消</button>
    </div>
  </div>
</div>

<script>
// ===== AUDIO (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = localStorage.getItem('habit_sound') !== 'off';

function ensureAudio(){
  if(!audioCtx) audioCtx = new AudioCtx();
}
function playTone(freq,dur,type='sine',vol=.3){
  if(!soundEnabled) return;
  try{
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playTask(){playTone(523,0.12);setTimeout(()=>playTone(659,0.12),100);setTimeout(()=>playTone(784,0.2),200);}
function playUpgrade(){playTone(523,0.15);setTimeout(()=>playTone(659,0.15),120);setTimeout(()=>playTone(784,0.15),240);setTimeout(()=>playTone(1047,0.3),360);}
function playHeartLost(){playTone(200,0.3,'sawtooth',.2);setTimeout(()=>playTone(160,0.4,'sawtooth',.15),150);}
function playChest(){playTone(440,0.1);setTimeout(()=>playTone(554,0.1),80);setTimeout(()=>playTone(659,0.1),160);setTimeout(()=>playTone(880,0.3),240);}
function playStreak(){playTone(784,0.12);setTimeout(()=>playTone(988,0.12),100);setTimeout(()=>playTone(1175,0.12),200);setTimeout(()=>playTone(1319,0.4),300);}

// ===== STATE =====
const DEFAULTS = {
  hearts:5, gems:0, xp:0, level:1, day:1,
  checkins:[], // array of date strings "YYYY-MM-DD"
  streak:0, longestStreak:0,
  lastCheckinDate:null,
  questsCompleted:[],
  shopItems:{},
  doubleXP:false,
  doubleXPUntil:null,
  soundOn:true
};
let state = {};

function loadState(){
  try{
    const raw = localStorage.getItem('habit_state');
    if(raw){state=JSON.parse(raw);return}
  }catch(e){}
  state = JSON.parse(JSON.stringify(DEFAULTS));
}
function saveState(){
  localStorage.setItem('habit_state',JSON.stringify(state));
}

// ===== HEARTS =====
function renderHearts(){
  const c = document.getElementById('hearts-container');
  let h='';
  for(let i=0;i<5;i++) h+= i<state.hearts ? '❤️' : '🖤';
  c.innerHTML = h;
}
function loseHeart(){
  if(state.hearts<=0) return false;
  state.hearts--;
  playHeartLost();
  renderHearts(); saveState();
  if(state.hearts<=0){
    showModal('💔','爱心耗尽!','今天不能再操作了,明天重置吧😢','确定');
  }
  return true;
}
function gainHeart(){
  if(state.hearts<5){state.hearts++;renderHearts();saveState();}
}

// ===== XP / GEMS =====
function addXP(amt){
  const multi = (state.doubleXP && state.doubleXPUntil && Date.now()<state.doubleXPUntil) ? 2 : 1;
  const total = amt*multi;
  state.xp += total;
  updateXP();
  return total;
}
function addGems(amt){state.gems+=amt;updateGems();}
function updateXP(){document.getElementById('xp-count').textContent=state.xp;saveState();}
function updateGems(){document.getElementById('gem-count').textContent=state.gems;saveState();}

// ===== BOARD =====
const BOARD_SIZE = 50;
const TREASURE_INTERVAL = 5;

function buildBoard(){
  const track = document.getElementById('board-track');
  track.innerHTML='';
  for(let i=1;i<=BOARD_SIZE;i++){
    if(i>1){
      const dot = document.createElement('div');
      dot.className='board-path-connector';
      track.appendChild(dot);
    }
    const node = document.createElement('div');
    node.className='board-node';
    node.dataset.day=i;
    const completed = state.checkins.includes(dateStrForDay(i));
    const locked = i>state.day;
    if(completed) node.classList.add('completed');
    if(locked) node.classList.add('locked');
    if(i%TREASURE_INTERVAL===0) node.classList.add('treasure');

    node.innerHTML = `
      <span class="node-day">Day ${i}</span>
      <span class="node-icon">${i%TREASURE_INTERVAL===0?'🎁':completed?'✅':'⬜'}</span>
      <span class="node-label">${i%TREASURE_INTERVAL===0?'宝箱':completed?'完成':'未完成'}</span>
      ${completed?'<span class="checkmark">⭐</span>':''}
    `;
    if(!locked && !completed){
      node.addEventListener('click',()=>checkinDay(i));
    }
    track.appendChild(node);
  }
  // scroll to current
  const cur = track.querySelector(`[data-day="${state.day}"]`);
  if(cur) setTimeout(()=>cur.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),100);
}

function dateStrForDay(day){
  const d = new Date();
  if(day===1) return toDateStr(d);
  return toDateStr(new Date(d.getTime() + (day-1)*86400000));
}
function toDateStr(d){return d.toISOString().slice(0,10);}

function checkinDay(day){
  if(state.hearts<=0){showToast('❤️爱心耗尽! 明天再来吧');return;}
  if(state.checkins.includes(dateStrForDay(day))){showToast('今天已打卡 ✓');return;}
  if(day>state.day){showToast('前面的关卡还没解锁');return;}
  if(day<state.day && !state.checkins.includes(dateStrForDay(day))){showToast('请按顺序打卡');return;}

  if(!loseHeart()) return;

  const ds = toDateStr(new Date());
  if(!state.checkins.includes(ds)){
    state.checkins.push(ds);
    const yesterday = toDateStr(new Date(Date.now()-86400000));
    if(state.lastCheckinDate===yesterday || state.lastCheckinDate===null){
      state.streak++;
    } else if(state.lastCheckinDate!==ds){
      state.streak = 1;
    }
    if(state.streak>state.longestStreak) state.longestStreak=state.streak;
    state.lastCheckinDate = ds;
    if(day>=state.day) state.day = day+1;
    playTask();
    const xpGain = addXP(10 + Math.floor(state.streak/3)*5);
    addGems(2);
    showToast(`✅ Day ${day} 打卡成功! +${xpGain}XP +2💎`);

    // check streak milestone
    if(state.streak%7===0 && state.streak>0){
      playStreak();
      showModal('🔥🔥🔥',`连续 ${state.streak} 天!`,`超大奖励! +100XP +50宝石 +1❤️`,'太棒了!');
      addXP(100); addGems(50); gainHeart();
    }

    // treasure?
    if(day%TREASURE_INTERVAL===0){
      openTreasure(day);
    }

    buildBoard(); renderHearts(); updateXP(); updateGems();
    saveState();
    renderQuests(); renderDailyQuests();
    renderStats();
  } else {
    showToast('今天已打卡');
  }
}

function openTreasure(day){
  playChest();
  const reward = Math.random();
  let msg, icon='🎁';
  if(reward<.2){ // 20% heart
    gainHeart(); msg='+1❤️'; icon='❤️';
  } else if(reward<.6){ // 40% gems
    addGems(50); msg='+50💎'; icon='💎';
  } else if(reward<.85){ // 25% appearance
    state.shopItems['cosmetic_'+(day/5)] = true;
    msg='🎨 获得限定外观!'; icon='👑';
  } else { // 15% double XP
    state.doubleXP=true;
    state.doubleXPUntil = Date.now() + 1800000;
    msg='⚡ 双倍经验 30 分钟!'; icon='⚡';
  }
  showModal(icon,'🎉 宝箱开启!',msg,'太好了!');
  saveState();
}

// ===== QUESTS (achievement-style) =====
const QUESTS = [
  {id:'q1',title:'早起挑战',desc:'在 8:00 前完成打卡',icon:'🌅'},
  {id:'q2',title:'连续3天',desc:'连续打卡 3 天',icon:'🔥'},
  {id:'q3',title:'连续7天',desc:'连续打卡 7 天',icon:'💥'},
  {id:'q4',title:'首次打卡',desc:'完成第一次打卡',icon:'🌟'},
  {id:'q5',title:'10天达人',desc:'累计打卡 10 天',icon:'🏅'},
  {id:'q6',title:'30天传奇',desc:'累计打卡 30 天',icon:'🏆'},
  {id:'q7',title:'宝石收藏家',desc:'拥有 200 宝石',icon:'💎'},
  {id:'q8',title:'等级提升',desc:'达到 5 级',icon:'⭐'},
];
function renderQuests(){
  const list = document.getElementById('quests-list');
  if(!list) return;
  list.innerHTML = QUESTS.map(q=>{
    const done = state.questsCompleted.includes(q.id);
    return `<div class="quest-card">
      <span style="font-size:32px">${q.icon}</span>
      <div class="q-info">
        <div class="q-title">${q.title}</div>
        <div class="q-desc">${q.desc}</div>
      </div>
      <button class="q-btn ${done?'done':''}" ${done?'disabled':''} data-quest="${q.id}">${done?'✓ 已完成':'开始'}</button>
    </div>`;
  }).join('');
  list.querySelectorAll('.q-btn:not(.done)').forEach(btn=>{
    btn.addEventListener('click',()=>startQuest(btn.dataset.quest));
  });
}
function startQuest(qid){
  showToast('📋 任务已追踪! 完成条件后会自动结算');
}

// ===== DAILY QUESTS =====
function generateDailyQuests(){
  const today = toDateStr(new Date());
  const raw = localStorage.getItem('habit_daily_quests');
  const stored = raw ? JSON.parse(raw) : null;
  if(stored && stored.date===today) return stored.quests;

  const pool = [
    {title:'运动10分钟',desc:'做一组运动,活动身体',icon:'🏃'},
    {title:'阅读15分钟',desc:'读一页书或文章',icon:'📖'},
    {title:'喝8杯水',desc:'保持水分充足',icon:'💧'},
    {title:'冥想5分钟',desc:'安静地冥想',icon:'🧘'},
    {title:'整理房间',desc:'花10分钟整理空间',icon:'🧹'},
    {title:'学习新单词',desc:'背10个新单词',icon:'📝'},
    {title:'健康饮食',desc:'吃一份蔬菜沙拉',icon:'🥗'},
    {title:'拉伸放松',desc:'做5分钟拉伸',icon:'🤸'},
    {title:'写日记',desc:'记录今天的心情',icon:'✍️'},
    {title:'和家人通话',desc:'给家人打个电话',icon:'📞'},
  ];
  const shuffled = pool.sort(()=>Math.random()-.5);
  const quests = shuffled.slice(0,3).map((q,i)=>({
    id:'daily_'+(i+1), title:q.title, desc:q.desc, icon:q.icon, done:false,
    reward:{xp:10,gems:20}
  }));
  const data = {date:today, quests, completed:false};
  localStorage.setItem('habit_daily_quests',JSON.stringify(data));
  return quests;
}

function renderDailyQuests(){
  const list = document.getElementById('daily-quests-list');
  if(!list) return;
  const quests = generateDailyQuests();
  const today = toDateStr(new Date());
  const stored = JSON.parse(localStorage.getItem('habit_daily_quests')||'{}');
  const completed = stored.completed || false;

  list.innerHTML = quests.map((q,i)=>{
    const done = q.done || (stored.quests && stored.quests[i] && stored.quests[i].done);
    return `<div class="quest-card">
      <span style="font-size:32px">${q.icon}</span>
      <div class="q-info">
        <div class="q-title">${q.title}</div>
        <div class="q-desc">${q.desc}</div>
        <div class="q-reward">+${q.reward.xp}XP · +${q.reward.gems}💎</div>
      </div>
      <button class="q-btn ${done||completed?'done':''}" ${done||completed?'disabled':''} data-daily="${i}">${done||completed?'✓ 完成':'完成'}</button>
    </div>`;
  }).join('');

  if(!completed){
    list.querySelectorAll('.q-btn:not(.done)').forEach(btn=>{
      btn.addEventListener('click',()=>completeDailyQuest(parseInt(btn.dataset.daily)));
    });
  }
}

function completeDailyQuest(idx){
  if(state.hearts<=0){showToast('❤️爱心耗尽!');return;}
  loseHeart();
  const stored = JSON.parse(localStorage.getItem('habit_daily_quests')||'{}');
  if(!stored.quests || stored.quests[idx].done) return;
  stored.quests[idx].done = true;
  const allDone = stored.quests.every(q=>q.done);
  if(allDone) stored.completed = true;
  localStorage.setItem('habit_daily_quests',JSON.stringify(stored));

  const q = stored.quests[idx];
  playTask();
  const xp = addXP(q.reward.xp);
  addGems(q.reward.gems);
  showToast(`✅ ${q.title} 完成! +${xp}XP +${q.reward.gems}💎`);
  renderDailyQuests();
  renderHearts(); updateXP(); updateGems();
  saveState();

  if(allDone){
    playUpgrade();
    showModal('🎉','所有每日任务完成!','获得额外 +20XP +10💎 奖励!','太棒了!');
    addXP(20); addGems(10);
    updateXP(); updateGems();
  }
}

// ===== SHOP =====
const SHOP_ITEMS = [
  {id:'s1',name:'补充❤️',desc:'恢复一颗爱心',icon:'❤️',cost:50,action:()=>gainHeart()},
  {id:'s2',name:'宝石礼包',desc:'获得 100 宝石',icon:'💎',cost:30,action:()=>addGems(100)},
  {id:'s3',name:'双倍经验',desc:'30分钟双倍XP',icon:'⚡',cost:50,action:()=>{
    state.doubleXP=true; state.doubleXPUntil=Date.now()+1800000; saveState();
    showToast('⚡ 双倍经验已激活!');
  }},
  {id:'s4',name:'外观: 暗影',desc:'限定暗影主题',icon:'🌑',cost:80,action:()=>{
    state.shopItems['cosmetic_shadow']=true; saveState();
    showToast('🌑 获得暗影外观!');
  }},
];
function renderShop(){
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = SHOP_ITEMS.map(item=>`
    <div class="shop-card">
      <div class="shop-icon">${item.icon}</div>
      <div class="shop-name">${item.name}</div>
      <div class="shop-desc">${item.desc}</div>
      <button class="shop-btn" data-shop="${item.id}">${item.cost}💎 购买</button>
    </div>
  `).join('');
  grid.querySelectorAll('.shop-btn').forEach(btn=>{
    btn.addEventListener('click',()=>buyItem(btn.dataset.shop));
  });
}
function buyItem(id){
  const item = SHOP_ITEMS.find(i=>i.id===id);
  if(!item) return;
  if(state.gems < item.cost){showToast(`❌ 宝石不足! 需要 ${item.cost}💎`);return;}
  state.gems -= item.cost;
  updateGems();
  item.action();
  saveState();
  playChest();
  renderShop();
}

// ===== STATS =====
function renderStats(){
  const el = document.getElementById('stats-content');
  if(!el) return;
  el.innerHTML = `
    <div class="stat-row"><span class="stat-label">🔥 连续天数</span><span class="stat-value">${state.streak} 天</span></div>
    <div class="stat-row"><span class="stat-label">🏆 最长连续</span><span class="stat-value">${state.longestStreak} 天</span></div>
    <div class="stat-row"><span class="stat-label">📅 总打卡</span><span class="stat-value">${state.checkins.length} 天</span></div>
    <div class="stat-row"><span class="stat-label">✨ 经验值</span><span class="stat-value">${state.xp} XP</span></div>
    <div class="stat-row"><span class="stat-label">💎 宝石</span><span class="stat-value">${state.gems}</span></div>
    <div class="stat-row"><span class="stat-label">❤️ 爱心</span><span class="stat-value">${state.hearts}/5</span></div>
    <div class="stat-row"><span class="stat-label">🎪 外观</span><span class="stat-value">${Object.keys(state.shopItems).filter(k=>state.shopItems[k]).length} 个</span></div>
    <div style="text-align:center;margin-top:8px">
      <span class="streak-badge ${state.streak===0?'sad':''}">
        ${state.streak===0?'😢 断连了':'🔥 '+state.streak+' 天连击'}
      </span>
    </div>
    ${state.doubleXP&&state.doubleXPUntil&&Date.now()<state.doubleXPUntil?`<div style="text-align:center;margin-top:8px;color:#fbbf24;font-weight:700">⚡ 双倍经验进行中 (剩余 ${Math.floor((state.doubleXPUntil-Date.now())/60000)} 分钟)</div>`:''}
  `;
}

// ===== TOAST =====
let toastTimeout;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== MODAL =====
function showModal(icon,title,desc,btnText){
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-desc').textContent = desc;
  document.getElementById('modal-primary').textContent = btnText || '好的';
  document.getElementById('modal-overlay').classList.add('open');
}
document.getElementById('modal-primary').addEventListener('click',()=>{
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click',(e)=>{
  if(e.target===e.currentTarget) document.getElementById('modal-overlay').classList.remove('open');
});

// ===== TAB SWITCHING =====
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+tab.dataset.tab).classList.add('active');
  });
});

// ===== SOUND TOGGLE =====
document.getElementById('sound-toggle').addEventListener('click',()=>{
  soundEnabled = !soundEnabled;
  localStorage.setItem('habit_sound',soundEnabled?'on':'off');
  document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
  if(soundEnabled) playTask();
});

// ===== CHECKIN BUTTON (quick) =====
document.getElementById('checkin-btn').addEventListener('click',()=>{
  const today = toDateStr(new Date());
  let dayNum = state.day;
  if(state.checkins.includes(today)){
    showToast('✅ 今天已打卡!');
    return;
  }
  checkinDay(dayNum);
});

// ===== DAILY RESET CHECK =====
function checkDailyReset(){
  const today = toDateStr(new Date());
  const stored = localStorage.getItem('habit_daily_quests');
  if(stored){
    const data = JSON.parse(stored);
    if(data.date!==today){
      localStorage.removeItem('habit_daily_quests');
      renderDailyQuests();
    }
  }
  if(state.hearts===0 && state.lastCheckinDate!==today){
    state.hearts=5;
    renderHearts();
    saveState();
    showToast('❤️ 爱心已恢复! 新的一天加油!');
  }
}

// ===== INIT =====
loadState();
soundEnabled = localStorage.getItem('habit_sound') !== 'off';
document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
renderHearts(); updateXP(); updateGems();
buildBoard();
renderQuests();
renderDailyQuests();
renderShop();
renderStats();
checkDailyReset();

// periodic refresh for double XP display
setInterval(()=>{
  if(state.doubleXP && state.doubleXPUntil && Date.now()>=state.doubleXPUntil){
    state.doubleXP=false;
    state.doubleXPUntil=null;
    saveState();
    renderStats();
  }
  renderStats();
},30000);

console.log('🏰 习惯大陆 v2 · Duolingo-style habits');
console.log('📊 当前状态:',state);
</script>
