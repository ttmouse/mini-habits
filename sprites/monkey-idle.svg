<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6CE01A"/>
      <stop offset="100%" stop-color="#58CC02"/>
    </linearGradient>
    <linearGradient id="earGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE8C8"/>
      <stop offset="100%" stop-color="#F5D4A8"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF0D6"/>
      <stop offset="100%" stop-color="#FFE4BA"/>
    </linearGradient>
    <radialGradient id="blushGrad">
      <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFB6C1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 阴影 -->
  <ellipse cx="100" cy="230" rx="46" ry="7" fill="rgba(0,0,0,0.06)"/>

  <!-- 尾巴（垂着） -->
  <path d="M154,170 Q186,178 180,140 Q176,118 168,110" fill="none" stroke="#58CC02" stroke-width="7" stroke-linecap="round"/>

  <!-- 身体 -->
  <ellipse cx="100" cy="172" rx="48" ry="56" fill="url(#bodyGrad)"/>
  <ellipse cx="100" cy="182" rx="26" ry="30" fill="#D4F5A0" opacity="0.4"/>

  <!-- 双臂（托腮思考状） -->
  <path d="M52,152 Q42,168 48,182" fill="none" stroke="url(#bodyGrad)" stroke-width="12" stroke-linecap="round"/>
  <circle cx="48" cy="184" r="8" fill="url(#faceGrad)"/>
  <path d="M148,152 Q158,168 152,182" fill="none" stroke="url(#bodyGrad)" stroke-width="12" stroke-linecap="round"/>
  <circle cx="152" cy="184" r="8" fill="url(#faceGrad)"/>

  <!-- 腿 -->
  <ellipse cx="82" cy="228" rx="14" ry="7" fill="#4AB502"/>
  <path d="M82,212 Q80,224 82,228" fill="none" stroke="#4AB502" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="118" cy="228" rx="14" ry="7" fill="#4AB502"/>
  <path d="M118,212 Q120,224 118,228" fill="none" stroke="#4AB502" stroke-width="12" stroke-linecap="round"/>

  <!-- 耳朵 -->
  <circle cx="42" cy="88" r="20" fill="url(#earGrad)" stroke="#E8D4B0" stroke-width="2"/>
  <circle cx="158" cy="88" r="20" fill="url(#earGrad)" stroke="#E8D4B0" stroke-width="2"/>

  <!-- 头部 -->
  <ellipse cx="100" cy="100" rx="60" ry="58" fill="url(#bodyGrad)"/>

  <!-- 脸部 -->
  <ellipse cx="100" cy="110" rx="38" ry="32" fill="url(#faceGrad)"/>

  <!-- 腮红 -->
  <ellipse cx="68" cy="116" rx="11" ry="7" fill="url(#blushGrad)"/>
  <ellipse cx="132" cy="116" rx="11" ry="7" fill="url(#blushGrad)"/>

  <!-- 左眼（半闭 - 温柔） -->
  <ellipse cx="78" cy="100" rx="14" ry="16" fill="#fff"/>
  <ellipse cx="82" cy="102" rx="7" ry="8" fill="#3C3C3C"/>
  <circle cx="85" cy="98" r="3" fill="#fff"/>
  <!-- 下眼睑（温柔眯眼线） -->
  <path d="M64,106 Q78,114 92,106" fill="none" stroke="#3C3C3C" stroke-width="1.2" opacity="0.3"/>

  <!-- 右眼（半闭） -->
  <ellipse cx="122" cy="100" rx="14" ry="16" fill="#fff"/>
  <ellipse cx="126" cy="102" rx="7" ry="8" fill="#3C3C3C"/>
  <circle cx="129" cy="98" r="3" fill="#fff"/>
  <path d="M108,106 Q122,114 136,106" fill="none" stroke="#3C3C3C" stroke-width="1.2" opacity="0.3"/>

  <!-- 眉毛 - 温柔 -->
  <path d="M68,85 Q78,82 90,84" fill="none" stroke="#3C3C3C" stroke-width="2" stroke-linecap="round"/>
  <path d="M110,84 Q122,82 132,85" fill="none" stroke="#3C3C3C" stroke-width="2" stroke-linecap="round"/>

  <!-- 嘴巴 - 微笑温和 -->
  <path d="M86,126 Q100,136 114,126" fill="none" stroke="#3C3C3C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 鼻子 -->
  <ellipse cx="100" cy="112" rx="3" ry="2.2" fill="#D4A574"/>
  <circle cx="97.5" cy="112.5" r="1" fill="#B8864E"/>
  <circle cx="102.5" cy="112.5" r="1" fill="#B8864E"/>

  <!-- 小叶子装饰（头上） -->
  <g transform="translate(100,45)">
    <path d="M0,0 Q-10,-14 0,-24 Q10,-14 0,0Z" fill="#8BC34A" opacity="0.8"/>
    <path d="M0,-2 Q-8,-14 0,-22" fill="none" stroke="#4CAF50" stroke-width="0.8" opacity="0.5"/>
  </g>
</svg>
